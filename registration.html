<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; font-size: 22px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #00796b; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00796b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:disabled { background-color: #999; }
        #status {
            margin-top: 15px;
            font-size: 14px;
            display: none;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>রেজিস্ট্রেশন করুন</h2>
    <input type="email" id="email" placeholder="আপনার ইমেইল দিন...">
    <button id="btn" onclick="quickRegister()">রেজিস্ট্রেশন</button>
    <div id="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD80uA81X3bkwiousPwXpIv6OKkk1k2icA",
        authDomain: "rjfoundation-25.firebaseapp.com",
        projectId: "rjfoundation-25",
        storageBucket: "rjfoundation-25.firebasestorage.app",
        messagingSenderId: "469641336275",
        appId: "1:469641336275:web:e79889fb0247f352f04b26"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.quickRegister = () => {
        const email = document.getElementById('email').value;
        const status = document.getElementById('status');
        const btn = document.getElementById('btn');

        if(!email) {
            alert("⚠️ দয়া করে আপনার ইমেইল দিন!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "অপেক্ষা করুন...";

        // ডিফল্ট পাসওয়ার্ড এবং নাম সেট করা হচ্ছে
        const defaultPass = "info.rjfoundation25@gmail.com"; 
        const defaultName = email.split('@')[0].toUpperCase();

        createUserWithEmailAndPassword(auth, email, defaultPass)
        .then((res) => {
            updateProfile(res.user, { displayName: defaultName }).then(() => {
                status.style.display = "block";
                status.style.color = "#1b5e20";
                status.style.backgroundColor = "#e8f5e9";
                status.innerHTML = "✅ আপনার রেজিস্ট্রেশন সফল হয়েছে! ফিডব্যাক পেজে নিয়ে যাওয়া হচ্ছে...";
                
                setTimeout(() => {
                    window.location.href = "feedback.html"; 
                }, 2000);
            });
        })
        .catch((err) => {
            btn.disabled = false;
            btn.innerText = "সাবমিট করুন";
            status.style.display = "block";
            status.style.color = "#b71c1c";
            status.style.backgroundColor = "#ffebee";
            
            if(err.code === "auth/email-already-in-use") {
                status.innerHTML = "❌ এই ইমেইলটি ইতিমধ্যেই ব্যবহার করা হয়েছে!";
            } else {
                status.innerHTML = "❌ আপনার ইমেইল সঠিক নয়! অনুগ্রহ করে সঠিক ইমেইল দিন।";
            }
        });
    }
</script>

</body>
</html>
