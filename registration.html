<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Registration | RJ Foundation</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00796b;
            --primary-hover: #005a4f;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --error-bg: #ffebee;
            --error-text: #c62828;
            --success-bg: #e8f5e9;
            --success-text: #2e7d32;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Bengali', sans-serif;
            background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 360px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h2 { 
            color: var(--text-color); 
            margin-bottom: 25px; 
            font-size: 24px; 
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
            background-color: #fafafa;
        }

        input:focus { 
            border-color: var(--primary-color); 
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 121, 107, 0.1);
        }

        input::placeholder {
            color: #9e9e9e;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover:not(:disabled) { 
            background-color: var(--primary-hover); 
            box-shadow: 0 4px 12px rgba(0, 121, 107, 0.3);
        }

        button:disabled { 
            background-color: #b0bec5; 
            cursor: not-allowed; 
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert-box {
            margin-top: 20px;
            font-size: 14px;
            display: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            text-align: left;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success {
            background-color: var(--success-bg);
            color: var(--success-text);
            border-left: 4px solid var(--success-text);
        }

        .alert-error {
            background-color: var(--error-bg);
            color: var(--error-text);
            border-left: 4px solid var(--error-text);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>а¶∞аІЗа¶Ьа¶ња¶ЄаІНа¶ЯаІНа¶∞аІЗа¶ґа¶® а¶Ха¶∞аІБа¶®</h2>
    
    <div class="input-group">
        <input type="email" id="email" placeholder="а¶Жа¶™а¶®а¶Ња¶∞ а¶За¶ЃаІЗа¶За¶≤ а¶ЕаІНа¶ѓа¶Ња¶°аІНа¶∞аІЗа¶Є а¶¶а¶ња¶®..." autocomplete="email">
    </div>

    <button id="btn" onclick="quickRegister()">
        <span id="btn-text">а¶∞аІЗа¶Ьа¶ња¶ЄаІНа¶ЯаІНа¶∞аІЗа¶ґа¶® а¶Єа¶ЃаІНа¶™а¶®аІНа¶® а¶Ха¶∞аІБа¶®</span>
        <div class="spinner" id="spinner"></div>
    </button>
    
    <div id="status" class="alert-box"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyD80uA81X3bkwiousPwXpIv6OKkk1k2icA",
        authDomain: "rjfoundation-25.firebaseapp.com",
        projectId: "rjfoundation-25",
        storageBucket: "rjfoundation-25.firebasestorage.app",
        messagingSenderId: "469641336275",
        appId: "1:469641336275:web:e79889fb0247f352f04b26"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Default System Variables
    const DEFAULT_PASS = "info.rjfoundation25@gmail.com";

    // Utility: Validate Email Format via Regex
    const isValidEmail = (email) => {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return regex.test(email);
    };

    // Utility: Show Alert Messages
    const showAlert = (element, message, type) => {
        element.style.display = "block";
        element.className = `alert-box alert-${type}`;
        element.innerHTML = type === 'success' ? `вЬЕ ${message}` : `вЪ†пЄП ${message}`;
    };

    // Main Registration Function (Using Async/Await for better readability)
    window.quickRegister = async () => {
        const emailInput = document.getElementById('email');
        const statusBox = document.getElementById('status');
        const btn = document.getElementById('btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('spinner');
        
        const email = emailInput.value.trim();

        // 1. Initial Validation
        if (!email) {
            showAlert(statusBox, "а¶¶аІЯа¶Њ а¶Ха¶∞аІЗ а¶Жа¶™а¶®а¶Ња¶∞ а¶За¶ЃаІЗа¶За¶≤ а¶™аІНа¶∞а¶¶а¶Ња¶® а¶Ха¶∞аІБа¶®!", "error");
            emailInput.focus();
            return;
        }

        if (!isValidEmail(email)) {
            showAlert(statusBox, "а¶Жа¶™а¶®а¶Ња¶∞ а¶За¶ЃаІЗа¶За¶≤ а¶Ђа¶∞а¶ЃаІНа¶ѓа¶Ња¶Яа¶Яа¶њ а¶Єа¶†а¶ња¶Х а¶®аІЯ!", "error");
            emailInput.focus();
            return;
        }

        // 2. Loading State UI Updates
        btn.disabled = true;
        btnText.innerText = "а¶Еа¶™аІЗа¶ХаІНа¶Ја¶Њ а¶Ха¶∞аІБа¶®...";
        spinner.style.display = "block";
        statusBox.style.display = "none"; // Hide previous alerts

        const defaultName = email.split('@')[0].toUpperCase();

        // 3. Firebase Authentication Process
        try {
            // Create User
            const userCredential = await createUserWithEmailAndPassword(auth, email, DEFAULT_PASS);
            
            // Update Profile Name
            await updateProfile(userCredential.user, { displayName: defaultName });

            // Success Handling
            showAlert(statusBox, "а¶∞аІЗа¶Ьа¶ња¶ЄаІНа¶ЯаІНа¶∞аІЗа¶ґа¶® а¶Єа¶Ђа¶≤! а¶∞а¶ња¶°а¶Ња¶За¶∞аІЗа¶ХаІНа¶Я а¶Ха¶∞а¶Њ а¶єа¶ЪаІНа¶ЫаІЗ...", "success");
            
            // Redirect after 1.5 seconds
            setTimeout(() => {
                window.location.href = "feedback.html"; 
            }, 1500);

        } catch (error) {
            // Error Handling UI Revert
            btn.disabled = false;
            btnText.innerText = "а¶∞аІЗа¶Ьа¶ња¶ЄаІНа¶ЯаІНа¶∞аІЗа¶ґа¶® а¶Єа¶ЃаІНа¶™а¶®аІНа¶® а¶Ха¶∞аІБа¶®";
            spinner.style.display = "none";

            // Categorized Error Messages
            let errorMessage = "а¶Єа¶Ња¶∞аІНа¶≠а¶Ња¶∞аІЗ а¶Па¶Ха¶Яа¶њ а¶Єа¶Ѓа¶ЄаІНа¶ѓа¶Њ а¶єаІЯаІЗа¶ЫаІЗа•§ а¶Жа¶ђа¶Ња¶∞ а¶ЪаІЗа¶ЈаІНа¶Яа¶Њ а¶Ха¶∞аІБа¶®а•§";
            
            switch (error.code) {
                case "auth/email-already-in-use":
                    errorMessage = "а¶Па¶З а¶За¶ЃаІЗа¶За¶≤а¶Яа¶њ а¶¶а¶њаІЯаІЗ а¶За¶§а¶ња¶Ѓа¶ІаІНа¶ѓаІЗа¶З а¶∞аІЗа¶Ьа¶ња¶ЄаІНа¶ЯаІНа¶∞аІЗа¶ґа¶® а¶Ха¶∞а¶Њ а¶єаІЯаІЗа¶ЫаІЗ!";
                    break;
                case "auth/invalid-email":
                    errorMessage = "а¶За¶ЃаІЗа¶За¶≤ а¶ЕаІНа¶ѓа¶Ња¶°аІНа¶∞аІЗа¶Єа¶Яа¶њ а¶Єа¶†а¶ња¶Х а¶®аІЯа•§";
                    break;
                case "auth/network-request-failed":
                    errorMessage = "а¶За¶®аІНа¶Яа¶Ња¶∞а¶®аІЗа¶Я а¶Єа¶Ва¶ѓаІЛа¶Ч а¶ЪаІЗа¶Х а¶Ха¶∞аІБа¶®!";
                    break;
                case "auth/too-many-requests":
                    errorMessage = "а¶Еа¶®аІЗа¶Х а¶ђаІЗа¶ґа¶ња¶ђа¶Ња¶∞ а¶ЪаІЗа¶ЈаІНа¶Яа¶Њ а¶Ха¶∞а¶Њ а¶єаІЯаІЗа¶ЫаІЗа•§ а¶Ха¶ња¶ЫаІБа¶ХаІНа¶Ја¶£ а¶™а¶∞ а¶Жа¶ђа¶Ња¶∞ а¶ЪаІЗа¶ЈаІНа¶Яа¶Њ а¶Ха¶∞аІБа¶®а•§";
                    break;
            }
            
            showAlert(statusBox, errorMessage, "error");
            console.error("Firebase Auth Error:", error); // For debugging
        }
    };
</script>

</body>
</html>
