<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অফলাইন | সংযোগ বিচ্ছিন্ন</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            overflow: hidden;
            color: #fff;
        }

        /* গ্রাসমর্ফিজম কার্ড */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            margin-bottom: 25px;
        }

        /* অফলাইন আইকন অ্যানিমেশন */
        .icon-box svg {
            width: 80px;
            height: 80px;
            fill: #38bdf8;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* স্মার্ট বাটন */
        .retry-btn {
            background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
            text-decoration: none;
            display: inline-block;
        }

        .retry-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.5);
            background: linear-gradient(135deg, #7dd3fc 0%, #3b82f6 100%);
        }

        .retry-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-box">
            <!-- একটি প্রিমিয়াম Wi-Fi অফলাইন আইকন -->
            <svg viewBox="0 0 24 24">
                <path d="M23.64 7c-.45-.34-4.93-4-11.64-4-1.5 0-2.89.19-4.15.53L18.19 13.9 23.64 7zm-6.6 6.61L3.51 3.51 2.1 4.92l4.27 4.27C3.07 11.01 1.05 12.44.36 13l11.63 14.48L15.91 22h.01l4.23 4.23 1.41-1.41-4.52-4.52z"/>
            </svg>
        </div>
        <h1>দুঃখিত!</h1>
        <p>আপনার ইন্টারনেট সংযোগটি বিচ্ছিন্ন হয়ে গেছে। দয়া করে রাউটার বা ডেটা চেক করে আবার চেষ্টা করুন।</p>
        
        <button class="retry-btn" onclick="window.location.reload()">আবার চেষ্টা করুন</button>
    </div>

</body>
</html>
