<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্থায়ী কমিটি ও সাধারণ সদস্য | RJ Foundation</title>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/effects.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">

    <link rel="icon" type="image/png" href="/favicon.png">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rupshajonokollanfoundation.vercel.app/member">
    <meta property="og:title" content="রূপসা জনকল্যাণ ফাউন্ডেশন | স্থায়ী কমিটি ও সাধারণ সদস্য">
    <meta property="og:description" content="অসহায় ও দরিদ্র মানুষের পাশে দাঁড়িয়ে একটি সুন্দর ও মানবিক সমাজ গড়ে তোলাই আমাদের লক্ষ্য। আমাদের কার্যক্রমে যুক্ত হোন বা অবদান রাখুন।">
    <meta property="og:image" content="assets/meta-banner.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="রূপসা জনকল্যাণ ফাউন্ডেশন">
    <meta name="twitter:description" content="অসহায় ও দরিদ্র মানুষের পাশে দাঁড়িয়ে একটি সুন্দর ও মানবিক সমাজ গড়ে তোলাই আমাদের লক্ষ্য।">
    <meta name="twitter:image" content="assets/meta-banner.png">
</head>
<body>

    <!-- ================= স্প্ল্যাশ স্ক্রিন ================= -->
    <div id="splash-screen">
        <div class="memory-glow"></div>
        <div class="animation-wrapper">
            <div class="image-frame">
                <div class="slider-track">
                    <img src="https://rupshajf.vercel.app/gallery/national-anthem-all-team.webp" alt="Memory 1">
                    <img src="https://rupshajf.vercel.app/gallery/win-team.webp" alt="Memory 2">
                    <img src="https://rupshajf.vercel.app/gallery/lost-team.webp" alt="Memory 3">
                    <img src="https://rupshajf.vercel.app/gallery/team-trophy.webp" alt="Memory 4">
                    <img src="https://rupshajf.vercel.app/gallery/IMG_20260320_234348.jpg" alt="Memory 5">
                </div>
            </div>
            <h2 class="loading-text">আমাদের কার্যক্রম এক নজরে</h2>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <span id="percentage" class="percentage-text">0%</span>
        </div>
    </div>

    <!-- ================= নাভবার ================= -->
    <nav class="ultra-nav">
        <a href="/subscribe/" class="smart-sub-btn">
            <i class="fa-regular fa-bell"></i>
            <span class="btn-content">সাবস্ক্রাইব করুন</span>
            <div class="shimmer"></div>
        </a>
    </nav>

    <div class="main-wrapper">

        <!-- ================= হিরো ব্যানার ================= -->
        <div class="hero-banner">
            <div class="banner-content">
                <span class="eyebrow">RJ FOUNDATION</span>
                <h1>রূপসা জনকল্যাণ ফাউন্ডেশন</h1>
                <p>স্থায়ী কমিটি ও সাধারণ সদস্যবৃন্দ</p>
            </div>
            <div class="particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
        </div>

        <!-- ================= লাইভ ভিজিটর কাউন্টার ================= -->
        <div class="live-counter-wrapper">
            <div class="live-widget">
                <div class="live-indicator"><span class="pulse"></span></div>
                <div class="live-text"><i class="fas fa-eye"></i>এখন দেখছে</div>
                <div class="live-count-box"><span id="active-users">0</span> জন</div>
            </div>
        </div>

        <!-- ================= স্ট্যাটস ড্যাশবোর্ড ================= -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">মোট সদস্য</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-circle-check"></i></div>
                <div class="stat-value" id="stat-active">0</div>
                <div class="stat-label">সক্রিয় সদস্য</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-id-card"></i></div>
                <div class="stat-value" id="stat-verified">0</div>
                <div class="stat-label">ভেরিফাইড আইডি</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-sitemap"></i></div>
                <div class="stat-value" id="stat-categories">0</div>
                <div class="stat-label">বিভাগ / পদবী</div>
            </div>
        </div>

        <!-- ================= সার্চ ও ফিল্টার ================= -->
        <div class="controls-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="নাম লিখে খুঁজুন...">
            <select id="categoryFilter" class="category-filter">
                <option value="all">সবাই</option>
                <option value="প্রতিষ্ঠাতা পরিচালক">প্রতিষ্ঠাতা পরিচালক</option>
                <option value="সভাপতি">সভাপতি</option>
                <option value="সিনিয়র সহ-সভাপতি">সিনিয়র সহ-সভাপতি</option>
                <option value="সহ-সভাপতি">সহ-সভাপতি</option>
                <option value="সাধারণ সম্পাদক">সাধারণ সম্পাদক</option>
                <option value="যুগ্ম সাধারণ সম্পাদক">যুগ্ম সাধারণ সম্পাদক</option>
                <option value="কোষাধ্যক্ষ">কোষাধ্যক্ষ</option>
                <option value="প্রচার সম্পাদক">প্রচার সম্পাদক</option>
                <option value="সাংগঠনিক সম্পাদক">সাংগঠনিক সম্পাদক</option>
                <option value="দপ্তর সম্পাদক">দপ্তর সম্পাদক</option>
                <option value="ক্রিয়া সম্পাদক">ক্রিয়া সম্পাদক</option>
                <option value="সংস্কৃতি বিষয়ক সম্পাদক">সংস্কৃতি বিষয়ক সম্পাদক</option>
                <option value="সমাজসেবা বিষয়ক সম্পাদক">সমাজসেবা বিষয়ক সম্পাদক</option>
                <option value="উপদেষ্টা">উপদেষ্টা</option>
                <option value="সাধারণ সদস্য">সাধারণ সদস্য</option>
            </select>
        </div>
        <p class="result-count" id="result-count"></p>

        <!-- ================= মেম্বার ফ্রেম (অটো + ম্যানুয়াল স্ক্রল) ================= -->
        <div class="scroll-frame-wrapper">
            <div class="member-scroll-box" id="scroll-box">
                <div class="scroll-wrapper" id="scroll-content"></div>
            </div>

            <div class="scroll-controls">
                <button class="scroll-btn" onmousedown="startManualScroll(-1)" onmouseup="stopManualScroll()" onmouseleave="stopManualScroll()" ontouchstart="startManualScroll(-1)" ontouchend="stopManualScroll()" aria-label="উপরে স্ক্রল করুন"><i class="fa-solid fa-chevron-up"></i></button>
                <button class="scroll-btn" onmousedown="startManualScroll(1)" onmouseup="stopManualScroll()" onmouseleave="stopManualScroll()" ontouchstart="startManualScroll(1)" ontouchend="stopManualScroll()" aria-label="নিচে স্ক্রল করুন"><i class="fa-solid fa-chevron-down"></i></button>
            </div>
        </div>
        <p class="frame-hint"><i class="fa-solid fa-hand-pointer"></i>scrolling</p>
    </div>

    <!-- ================= মোডাল ================= -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-close-icon" onclick="toggleModal()">&times;</div>
            <img id="modal-img" src="" alt="Profile">
            <h2 id="modal-name">নাম</h2>
            <h4 id="modal-role">পদবী</h4>
            <span class="modal-status" id="modal-status"></span>
            <p id="modal-desc">বিবরণ</p>

            <a href="#" id="modal-member-link" target="_blank" rel="noopener" style="text-decoration:none;">
                <button type="button" id="modal-memberid" class="modal-id-btn">মেম্বার আইডি</button>
            </a>

            <div class="social-links" id="modal-social"></div>

            <button class="close-btn" onclick="toggleModal()">বন্ধ করুন</button>
        </div>
    </div>

    <!-- ================= স্ক্রল-টু-টপ ================= -->
    <button class="scroll-top-btn" id="scrollTopBtn" title="উপরে যান"><i class="fa-solid fa-arrow-up"></i></button>

    <!-- ================= ফুটার ================= -->
    <footer class="site-footer">
        <p>&copy; <span id="year"></span> <strong>রূপসা জনকল্যাণ ফাউন্ডেশন (RJ Foundation)</strong> — সর্বস্বত্ব সংরক্ষিত।</p>
    </footer>

    <!-- ================= ভিজ্যুয়াল ইফেক্টস ================= -->
    <canvas id="ultra-promax-snow"></canvas>
    <div class="premium-film-grain"></div>

    <!-- ================= স্ক্রিপ্টসমূহ ================= -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script src="js/data.js"></script>
    <script src="js/splash.js"></script>
    <script src="js/live-counter.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/app.js"></script>
    <script src="js/scrollbox.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
