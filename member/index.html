  /* প্রিমিয়াম ডার্ক মেমরি থিম */
  #splash-screen {

    background: radial-gradient(circle, rgba(251, 191, 36, 0.12) 0%, transparent 60%);

  }

  /* ছবি দেখানোর প্রিমিয়াম গ্লাস ফ্রেম */
  .image-frame {
    width: 320px;

  /* স্লাইডারের ট্র্যাক - ৫টি ছবির জন্য ৫০০% প্রস্থ */

    40%, 55% { transform: translateX(-40%); }         /* ছবি ৩ */

<script>
  (function() {
    const progressBar = document.getElementById('progress-bar');
    const percentageText = document.getElementById('percentage');
    const splash = document.getElementById('splash-screen');

    // নির্দিষ্ট ৫ সেকেন্ড (5000 মিলিসেকেন্ড) টার্গেট
    const totalDuration = 3000; 
    const updateInterval = 50; // প্রতি ৫০ মিলিসেকেন্ডে আপডেট হবে
    const step = 100 / (totalDuration / updateInterval); 
    
    let progress = 0;

    // ৫ সেকেন্ডে ঠিক ১০০% হওয়ার ক্যালকুলেশন
    const timer = setInterval(() => {
      progress += step;
      
      if (progress >= 100) {
        progress = 100;
        clearInterval(timer);
        hideSplashScreen();
      }

      const currentProgress = Math.floor(progress);
      progressBar.style.width = currentProgress + '%';
      percentageText.textContent = currentProgress + '%';
    }, updateInterval);

    // ৫ সেকেন্ড পার হওয়ার পর স্মুথলি হাইড করার ফাংশন
    function hideSplashScreen() {
      splash.classList.add('fade-out');
      setTimeout(() => {
        splash.style.display = 'none';
      }, 800); // অ্যানিমেশন শেষ হতে ৮০০ms সময় নেবে
    }
  })();
</script>

<script>
    // আপনার Firebase কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyDC0H-DW3avFnMRmipaI3qSyYLnb2B3CEU",
        authDomain: "rating-revieww.firebaseapp.com",
        databaseURL: "https://rating-revieww-default-rtdb.firebaseio.com",
        projectId: "rating-revieww",
        storageBucket: "rating-revieww.firebasestorage.app",
        messagingSenderId: "936802340652",
        appId: "1:936802340652:web:9283ff8a9ffcbee6686689"
    };

    // ফায়ারবেস ইনিশিয়ালাইজ করা
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    function startSmartTracker() {
        const onlineUsersRef = db.ref('live_website_visitors');
        const counterDisplay = document.getElementById('active-users');
        const countBox = document.querySelector('.live-count-box');
        
        if(!counterDisplay || !countBox) return;

        let currentCount = 0;

        // কানেকশন চেক করা
        db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                const myConnectionRef = onlineUsersRef.push();
                myConnectionRef.onDisconnect().remove();
                
                myConnectionRef.set({
                    device: navigator.platform,
                    joinedAt: firebase.database.ServerValue.TIMESTAMP
                });
            }
        });

        // রিয়েল-টাইমে মোট ইউজারের সংখ্যা গোনা
        onlineUsersRef.on('value', (snapshot) => {
            const newCount = snapshot.numChildren() || 0;

            if (newCount !== currentCount) {
                counterDisplay.innerText = newCount;
                
                // অ্যানিমেশন রিস্টার্ট করা
                countBox.classList.remove('pop-anim');
                void countBox.offsetWidth; 
                countBox.classList.add('pop-anim');
                
                currentCount = newCount;
            }
        });
    }

    // স্ক্রিপ্ট রান করানো
    document.addEventListener('DOMContentLoaded', startSmartTracker);
</script>

    const canvas = document.getElementById('ultra-promax-snow');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    // পারফরম্যান্স ও প্রিমিয়াম লুকের জন্য স্মার্ট পার্টিকেল কাউন্ট
    const maxParticles = width < 768 ? 40 : 80; 
    let particles = [];

    // মাউস ফিজিক্স
    const mouse = { x: -1000, y: -1000, radius: 180 };

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mouseout', () => {
        mouse.x = -1000;
        mouse.y = -1000;
    });

    window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    });

    // গ্লোবাল উইন্ড ফিজিক্স (প্রাকৃতিক বাতাস)
    let windTime = 0;

    class UltraPremiumSnow {
        constructor() {
            this.reset(true);
        }

        reset(isInitial = false) {
            this.x = Math.random() * width;
            this.y = isInitial ? Math.random() * height : -20;
            
            // সাইজ: 3D লুকের জন্য একটু ভেরিয়েশন (1px থেকে 3.5px)
            this.baseRadius = Math.random() * 2.5 + 1;
            this.radius = this.baseRadius;
            
            // স্পিড এবং ফিজিক্স
            this.speedY = (Math.random() * 1.5 + 0.5) * (this.baseRadius * 0.4); 
            this.speedX = Math.random() * 1 - 0.5;
            this.wobble = Math.random() * Math.PI * 2;
            this.wobbleSpeed = Math.random() * 0.02 + 0.01;
            
            // আল্ট্রা-প্রিমিয়াম গ্লো এর জন্য অপাসিটি
            this.baseOpacity = Math.random() * 0.5 + 0.4;
            this.opacity = this.baseOpacity;
        }

        update() {
            // প্রাকৃতিক দুলুনি (Wobble) এবং গ্লোবাল বাতাস
            this.wobble += this.wobbleSpeed;
            const globalWind = Math.sin(windTime) * 0.5;
            
            this.y += this.speedY;
            this.x += this.speedX + Math.cos(this.wobble) * 0.5 + globalWind;

            // স্মুথ মাউস রিপালশন (Fluid Dynamics)
            const dx = this.x - mouse.x;
            const dy = this.y - mouse.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < mouse.radius) {
                const force = (mouse.radius - distance) / mouse.radius;
                // মাউসের ধাক্কায় স্মুথলি দূরে সরা
                this.x += (dx / distance) * force * 4;
                this.y += (dy / distance) * force * 4;
                
                // মাউসের কাছাকাছি এলে কণাগুলো একটু বেশি গ্লো করবে
                this.opacity = Math.min(1, this.baseOpacity + force);
            } else {
                this.opacity = this.baseOpacity;
            }

            // নিচে যাওয়ার সময় ধীরে ধীরে ফেড-আউট হওয়া
            const distanceFromBottom = height - this.y;
            if (distanceFromBottom < 100) {
                this.opacity = this.baseOpacity * (distanceFromBottom / 100);
            }

            // স্ক্রিনের বাইরে গেলে রিসেট
            if (this.y > height || this.x < -50 || this.x > width + 50) {
                this.reset(false);
            }
        }

        draw() {
            // 3D Radial Gradient (আল্ট্রা প্রিমিয়াম আইস-ব্লু লুক)
            const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 2);
            
            // মাঝখানে খাঁটি সাদা গ্লো
            gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
            // চারপাশে প্রিমিয়াম আইস-ব্লু বা ক্রিস্টাল আভা
            gradient.addColorStop(0.4, `rgba(180, 225, 255, ${this.opacity * 0.8})`);
            // শেষে স্বচ্ছ হয়ে যাওয়া
            gradient.addColorStop(1, `rgba(180, 225, 255, 0)`);

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }
    }

    function init() {
        particles = [];
        for (let i = 0; i < maxParticles; i++) {
            particles.push(new UltraPremiumSnow());
        }
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        windTime += 0.005; // বাতাসের গতি পরিবর্তন
        
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
        }
        requestAnimationFrame(animate);
    }

    init();
    animate();
})();
</script>
