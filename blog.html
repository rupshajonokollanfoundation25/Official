<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমাদের কার্যক্রম - RJ Foundation Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00897b;
            --primary-light: #4db6ac;
            --secondary: #004d40;
            --accent: #ffab00;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.4);
            --gradient-main: linear-gradient(135deg, #00695c 0%, #00bfa5 100%);
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.08);
            --shadow-hard: 0 20px 40px rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: #f4f7f6;
            margin: 0;
            color: #2d3436;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* প্রিমিয়াম হেডার */
        .blog-header {
            text-align: center;
            padding: 120px 20px 100px;
            background: var(--gradient-main);
            color: white;
            position: relative;
            clip-path: ellipse(150% 100% at 50% 0%);
        }

        .blog-header h1 {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 700;
            margin: 0;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .blog-header p {
            font-size: clamp(16px, 2vw, 20px);
            opacity: 0.9;
            max-width: 600px;
            margin: 15px auto 0;
        }

        /* মেইন কন্টেইনার */
        .container {
            max-width: 1200px;
            margin: -50px auto 80px;
            padding: 0 20px;
            position: relative;
        }

        /* ডাইনামিক ফিল্টার ট্যাব */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 28px;
            background: var(--white);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            color: var(--secondary);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-soft);
            border: 1px solid transparent;
        }

        .tab.active {
            background: var(--secondary);
            color: white;
            transform: scale(1.05);
        }

        .tab:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ভিডিও সেকশন প্রো */
        .featured-video {
            margin-bottom: 60px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--shadow-hard);
            background: #000;
            position: relative;
            border: 8px solid var(--white);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* কার্ড গ্রিড অ্যানিমেশন */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .post-card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.05);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,137,123,0.15);
        }

        .image-wrapper {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s;
        }

        .post-card:hover .image-wrapper img {
            transform: scale(1.1);
        }

        .category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--accent);
            color: #000;
            padding: 5px 15px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            z-index: 2;
        }

        .post-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .post-content h3 {
            font-size: 20px;
            margin: 10px 0;
            color: var(--secondary);
            line-height: 1.5;
        }

        .btn-premium {
            margin-top: auto;
            padding: 12px;
            background: #f0f7f6;
            color: var(--primary);
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-premium:hover {
            background: var(--primary);
            color: white;
        }

        /* স্মুথ মডাল */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 41, 35, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 700px;
            border-radius: 30px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* স্ক্রল টপ বাটন - রিডিজাইন */
        #scrollTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
            z-index: 1000;
        }

        #scrollTop.show {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 600px) {
            .blog-header { padding: 80px 20px 60px; }
            .container { margin-top: -30px; }
            .post-card { border-radius: 15px; }
        }
    </style>
</head>
<body>

    <header class="blog-header">
        <h1>আমাদের কার্যক্রম</h1>
        <p>অসহায় মানুষের মুখে হাসি ফোটানোই আমাদের মূল লক্ষ্য। রুপসা জনকল্যাণ ফাউন্ডেশনের সাথে থাকুন।</p>
    </header>

    <div class="container">
        
        <div class="filter-container">
            <div class="tab active" onclick="filterPosts('সব')">সব কার্যক্রম</div>
            <div class="tab" onclick="filterPosts('খাদ্য')">খাদ্য বিতরণ</div>
            <div class="tab" onclick="filterPosts('স্বাস্থ্য')">স্বাস্থ্য সেবা</div>
            <div class="tab" onclick="filterPosts('শিক্ষা')">শিক্ষা সহায়তা</div>
        </div>

        <div class="featured-video">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/HVi9QtHG5Tk?rel=0" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="blog-grid" id="blogGrid">
            </div>
    </div>

    <div class="modal-overlay" id="postModal" onclick="closePost(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalBody"></div>
            <button class="btn-premium" style="width:100%; margin-top:20px;" onclick="closePost(null)">বন্ধ করুন</button>
        </div>
    </div>

    <div id="scrollTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">
        <i class="fas fa-chevron-up"></i>
    </div>

    <script>
        const activities = [
            {
                id: 0,
                category: "খাদ্য",
                title: "রমজানে ১০০ পরিবারের মাঝে ইফতার সামগ্রী বিতরণ",
                date: "২৮ মার্চ, ২০২৬",
                img: "https://plus.unsplash.com/premium_photo-1683140538884-07fb31428ca6?q=80&w=500",
                desc: "আমরা স্থানীয় এলাকায় ১০০টি অসহায় পরিবারের কাছে পৌঁছে দিয়েছি উন্নতমানের ইফতার সামগ্রী। এতে ছিল চাল, ডাল, তেল ও খেজুর।"
            },
            {
                id: 1,
                category: "শিক্ষা",
                title: "স্বপ্ন ডানা: শিক্ষার্থীদের মাঝে স্কুল ব্যাগ বিতরণ",
                date: "২০ মার্চ, ২০২৬",
                img: "https://images.unsplash.com/photo-1497633762265-9d179a990aa6?q=80&w=500",
                desc: "সুবিধাবঞ্চিত ২০ জন মেধাবী ছাত্র-ছাত্রীকে আমরা পুরো বছরের শিক্ষা উপকরণ ও ব্যাগ প্রদান করেছি।"
            },
            {
                id: 2,
                category: "স্বাস্থ্য",
                title: "বিনামূল্যে চক্ষু ক্যাম্প ও ঔষধ বিতরণ",
                date: "১৫ মার্চ, ২০২৬",
                img: "https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=500",
                desc: "বিশেষজ্ঞ চিকিৎসকদের মাধ্যমে ৩০০ জন রোগীকে বিনামূল্যে চক্ষু সেবা ও চশমা প্রদান করা হয়েছে।"
            }
        ];

        function displayPosts(filter = 'সব') {
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = '';
            
            const filtered = filter === 'সব' ? activities : activities.filter(a => a.category === filter);

            filtered.forEach((post, index) => {
                grid.innerHTML += `
                    <article class="post-card" style="animation-delay: ${index * 0.1}s">
                        <div class="image-wrapper">
                            <span class="category-badge">${post.category}</span>
                            <img src="${post.img}" alt="Activity">
                        </div>
                        <div class="post-content">
                            <div style="font-size:12px; color:#666;"><i class="far fa-calendar-alt"></i> ${post.date}</div>
                            <h3>${post.title}</h3>
                            <button class="btn-premium" onclick="openPost(${post.id})">বিস্তারিত দেখুন</button>
                        </div>
                    </article>
                `;
            });
        }

        function filterPosts(cat) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            displayPosts(cat);
        }

        function openPost(id) {
            const post = activities.find(a => a.id === id);
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <img src="${post.img}" style="width:100%; border-radius:20px; margin-bottom:20px;">
                <h2 style="color:var(--secondary); line-height:1.4;">${post.title}</h2>
                <p style="color:#666; font-size:14px;">প্রকাশিত: ${post.date}</p>
                <p style="font-size:17px; line-height:1.8; color:#444;">${post.desc}</p>
            `;
            document.getElementById('postModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePost(e) {
            document.getElementById('postModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onscroll = function() {
            const btn = document.getElementById('scrollTop');
            if (window.scrollY > 400) btn.classList.add('show');
            else btn.classList.remove('show');
        };

        // প্রাথমিক ভাবে পোস্টগুলো লোড করা
        displayPosts();
    </script>

</body>
</html>
