<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইন্টারনেট সংযোগ বিচ্ছিন্ন</title>
    <style>
        /* প্রফেশনাল গুগল ফন্ট যুক্ত করা হলো */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            background-color: #0f172a; /* প্রিমিয়াম ডার্ক ব্যাকগ্রাউন্ড */
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* মূল কন্টেইনার ডিজাইন */
        .offline-card {
            background-color: #1e293b;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.6s ease-out;
        }

        /* আইকন এনিমেশন */
        .icon-wrapper {
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .icon-wrapper svg {
            width: 80px;
            height: 80px;
            stroke: #f43f5e; /* সুন্দর লাল রঙ */
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            font-size: 15px;
            color: #94a3b8; /* হালকা গ্রে কালার টেক্সট */
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* প্রফেশনাল বাটন ডিজাইন */
        .retry-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Noto Sans Bengali', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .retry-btn:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        .retry-btn:active {
            transform: translateY(1px);
        }

        /* এনিমেশনের ফ্রেমগুলো */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="offline-card">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"></line>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                <line x1="12" y1="20" x2="12.01" y2="20"></line>
            </svg>
        </div>
        
        <h1>সংযোগ বিচ্ছিন্ন!</h1>
        <p>মনে হচ্ছে আপনার ইন্টারনেট কানেকশনটি বন্ধ আছে অথবা নেটওয়ার্ক সমস্যা হচ্ছে। দয়া করে কানেকশনটি চেক করুন।</p>
        
        <button class="retry-btn" onclick="window.location.reload()">পুনরায় চেষ্টা করুন</button>
    </div>

    <script>
        // স্মার্ট ফিচার: ইন্টারনেট কানেকশন ফিরে আসলেই পেজ অটোমেটিক রিলোড হয়ে যাবে
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>

</body>
</html>
