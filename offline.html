<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>connection failed</title>
    <style>
        /* Premium Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Modern Clean Card Design */
        .offline-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 40px -5px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
            animation: fadeIn 0.6s ease-out;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
            max-height: 95vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        /* Hide scrollbar for clean look */
        .offline-card::-webkit-scrollbar { display: none; }
        .offline-card { -ms-overflow-style: none; scrollbar-width: none; }

        /* Icon Wrapper */
        .icon-wrapper {
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #334155, #1e293b);
            border: 2px solid #475569;
            border-radius: 50%;
            animation: float 4s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        .icon-wrapper svg {
            width: 32px;
            height: 32px;
            stroke: #ef4444;
            filter: drop-shadow(0 0 5px rgba(239,68,68,0.5));
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Action Buttons Container */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        /* Professional Solid Button */
        .btn {
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            letter-spacing: 0.5px;
        }

        .retry-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .game-btn {
            background-color: transparent;
            color: #38bdf8;
            border: 2px solid #38bdf8;
            box-shadow: inset 0 0 10px rgba(56, 189, 248, 0.1);
        }

        .game-btn:hover {
            background-color: rgba(56, 189, 248, 0.1);
            transform: translateY(-2px);
            box-shadow: inset 0 0 15px rgba(56, 189, 248, 0.3), 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        /* Success Toast */
        .toast {
            position: fixed;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            bottom: 40px;
        }

        /* Game Container */
        .game-container {
            display: none;
            margin-top: 20px;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .game-container.show {
            display: flex;
            opacity: 1;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 12px;
            font-size: 14px;
            color: #cbd5e1;
            font-weight: 600;
            background: rgba(15, 23, 42, 0.5);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .score-board span span {
            color: #38bdf8;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
        }

        canvas#proGame {
            background-color: #020617;
            border: 2px solid #1e293b;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15), inset 0 0 20px rgba(0,0,0,0.8);
            cursor: crosshair;
        }

        .game-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }

        /* Effects */
        #ultra-promax-snow {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            pointer-events: none !important;
            z-index: 1 !important; 
            background: transparent !important;
        }

        .premium-film-grain {
            position: fixed !important;
            top: -100px !important;
            left: -100px !important;
            width: calc(100vw + 200px) !important;
            height: calc(100vh + 200px) !important;
            pointer-events: none !important;
            z-index: 2 !important; 
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.80" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E') !important;
            mix-blend-mode: overlay !important; 
            opacity: 0.06 !important; 
            will-change: transform;
            animation: cinematic-jitter 0.3s steps(6) infinite !important;
        }

        @keyframes cinematic-jitter {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            20% { transform: translate(-2%, 1%); }
            30% { transform: translate(1%, -2%); }
            40% { transform: translate(-1%, 3%); }
            50% { transform: translate(-2%, 1%); }
            60% { transform: translate(2%, 0%); }
            70% { transform: translate(0%, 2%); }
            80% { transform: translate(3%, 1%); }
            90% { transform: translate(-1%, 1%); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <canvas id="ultra-promax-snow"></canvas>
    <div class="premium-film-grain"></div>

    <div class="offline-card" id="card">
        <div id="mainContent">
            <div class="icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                    <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
                    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                    <line x1="12" y1="20" x2="12.01" y2="20"></line>
                </svg>
            </div>
            
            <h1>Connection Lost!</h1>
            <p>It looks like your internet connection is off or there's a network issue. Please check your connection.</p>
            
            <div class="action-buttons">
                <button class="btn retry-btn" id="retryBtn">
                    <div class="spinner" id="btnSpinner"></div>
                    <span id="btnText">Try Again</span>
                </button>
                <button class="btn game-btn" id="playGameBtn">
                    Launch Neon Shooter
                </button>
            </div>
        </div>

        <div class="game-container" id="gameContainer">
            <div class="score-board">
                <span>Score: <span id="currentScore">0</span></span>
                <span>Best: <span id="highScore">0</span></span>
            </div>
            <canvas id="proGame" width="280" height="340"></canvas>
            <p class="game-hint">Drag or Touch to move • Auto-Fire</p>
        </div>
    </div>

    <div class="toast" id="toast">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        Internet is back online!
    </div>

    <script>
        const btn = document.getElementById('retryBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('btnSpinner');
        const toast = document.getElementById('toast');
        const card = document.getElementById('card');
        const playGameBtn = document.getElementById('playGameBtn');
        const gameContainer = document.getElementById('gameContainer');

        // Smart Connection Checker
        async function checkConnection() {
            btn.style.pointerEvents = 'none';
            btnText.textContent = 'Checking...';
            spinner.style.display = 'block';

            await new Promise(resolve => setTimeout(resolve, 800));

            if (navigator.onLine) {
                showOnlineSuccess();
            } else {
                showOfflineError();
            }
        }

        function showOnlineSuccess() {
            btnText.textContent = 'Connection Restored!';
            spinner.style.display = 'none';
            btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            btn.style.boxShadow = '0 4px 15px rgba(16, 185, 129, 0.3)';
            toast.classList.add('show');
            setTimeout(() => { window.location.reload(); }, 1500);
        }

        function showOfflineError() {
            btn.style.pointerEvents = 'auto';
            btnText.textContent = 'Try Again';
            spinner.style.display = 'none';
            
            card.animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-6px)' },
                { transform: 'translateX(6px)' },
                { transform: 'translateX(-6px)' },
                { transform: 'translateX(6px)' },
                { transform: 'translateX(0)' }
            ], { duration: 400, easing: 'ease-in-out' });
        }

        btn.addEventListener('click', checkConnection);
        window.addEventListener('online', showOnlineSuccess);

        // --- PRO MAX GAME LOGIC (NEON SPACE SHOOTER) ---
        const cvs = document.getElementById("proGame");
        const ctx = cvs.getContext("2d");
        const currentScoreEl = document.getElementById("currentScore");
        const highScoreEl = document.getElementById("highScore");

        let animationId;
        let gameActive = false;
        let score = 0;
        let highScore = localStorage.getItem('neonShooterHigh') || 0;
        highScoreEl.textContent = highScore;

        // Entities
        let player, projectiles, enemies, particles;
        let frameCount = 0;

        class Player {
            constructor() {
                this.width = 24;
                this.height = 30;
                this.x = cvs.width / 2;
                this.y = cvs.height - 40;
                this.color = '#38bdf8'; // Neon Blue
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.translate(this.x, this.y);
                ctx.moveTo(0, -this.height / 2);
                ctx.lineTo(this.width / 2, this.height / 2);
                ctx.lineTo(-this.width / 2, this.height / 2);
                ctx.closePath();
                
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 3;
                this.velocity = 7;
                this.color = '#fde047'; // Neon Yellow
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
            }
            update() {
                this.y -= this.velocity;
                this.draw();
            }
        }

        class Enemy {
            constructor(x, y, radius, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.velocity = velocity;
                this.color = '#ec4899'; // Neon Pink
                this.vertices = Math.floor(Math.random() * 3) + 4; // 4 to 6 sides
                this.angle = 0;
                this.spinSpeed = (Math.random() - 0.5) * 0.1;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.beginPath();
                for (let i = 0; i < this.vertices; i++) {
                    ctx.lineTo(this.radius * Math.cos(this.angle + i * 2 * Math.PI / this.vertices),
                               this.radius * Math.sin(this.angle + i * 2 * Math.PI / this.vertices));
                }
                ctx.closePath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.stroke();
                ctx.restore();
            }
            update() {
                this.y += this.velocity;
                this.angle += this.spinSpeed;
                this.draw();
            }
        }

        class Particle {
            constructor(x, y, dx, dy, color) {
                this.x = x;
                this.y = y;
                this.dx = dx;
                this.dy = dy;
                this.color = color;
                this.alpha = 1;
                this.size = Math.random() * 2 + 1;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.dx;
                this.y += this.dy;
                this.alpha -= 0.02;
                this.draw();
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3;
                particles.push(new Particle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, color));
            }
        }

        function spawnEnemies() {
            // Smart Difficulty Scaling
            let spawnRate = Math.max(30, 90 - Math.floor(score / 5)); 
            if (frameCount % spawnRate === 0) {
                const radius = Math.random() * 10 + 10;
                const x = Math.random() * (cvs.width - radius * 2) + radius;
                const velocity = Math.random() * 1.5 + 1 + (score * 0.02);
                enemies.push(new Enemy(x, -radius, radius, velocity));
            }
        }

        function initGame() {
            gameActive = true;
            score = 0;
            frameCount = 0;
            currentScoreEl.textContent = score;
            player = new Player();
            projectiles = [];
            enemies = [];
            particles = [];
            animateGame();
        }

        function animateGame() {
            animationId = requestAnimationFrame(animateGame);
            frameCount++;

            // Cinematic Trail Effect
            ctx.fillStyle = 'rgba(2, 6, 23, 0.3)';
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            player.draw();

            // Auto Fire
            if (frameCount % 15 === 0) {
                projectiles.push(new Projectile(player.x, player.y - player.height / 2));
            }

            // Update Particles
            particles.forEach((particle, index) => {
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    particle.update();
                }
            });

            // Update Projectiles
            projectiles.forEach((projectile, pIndex) => {
                projectile.update();
                if (projectile.y + projectile.radius < 0) {
                    projectiles.splice(pIndex, 1);
                }
            });

            // Update Enemies & Collisions
            enemies.forEach((enemy, eIndex) => {
                enemy.update();

                // Collision with player (Game Over)
                const distPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distPlayer - enemy.radius - player.width / 2 < 1) {
                    cancelAnimationFrame(animationId);
                    gameOver();
                }

                // Collision with projectiles
                projectiles.forEach((projectile, pIndex) => {
                    const distProj = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);
                    if (distProj - enemy.radius - projectile.radius < 1) {
                        createParticles(enemy.x, enemy.y, enemy.color);
                        score += 10;
                        currentScoreEl.textContent = score;
                        setTimeout(() => {
                            enemies.splice(eIndex, 1);
                            projectiles.splice(pIndex, 1);
                        }, 0);
                    }
                });

                // Remove off-screen enemies
                if (enemy.y > cvs.height + enemy.radius) {
                    enemies.splice(eIndex, 1);
                }
            });

            spawnEnemies();
        }

        function gameOver() {
            gameActive = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonShooterHigh', highScore);
                highScoreEl.textContent = highScore;
            }
            
            // Glitchy Red Flash
            ctx.fillStyle = "rgba(239, 68, 68, 0.4)";
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            setTimeout(() => {
                ctx.fillStyle = "rgba(2, 6, 23, 0.8)";
                ctx.fillRect(0, 0, cvs.width, cvs.height);
                ctx.fillStyle = "#f8fafc";
                ctx.font = "bold 20px Poppins";
                ctx.textAlign = "center";
                ctx.fillText("CRASHED!", cvs.width / 2, cvs.height / 2 - 10);
                ctx.font = "12px Poppins";
                ctx.fillStyle = "#94a3b8";
                ctx.fillText("Tap to Restart", cvs.width / 2, cvs.height / 2 + 20);
            }, 100);
        }

        // Smart Controls (Mouse & Touch)
        function movePlayer(e) {
            if (!gameActive) return;
            const rect = cvs.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let x = clientX - rect.left;
            // Prevent going out of bounds
            player.x = Math.max(player.width / 2, Math.min(cvs.width - player.width / 2, x));
        }

        cvs.addEventListener("mousemove", movePlayer);
        cvs.addEventListener("touchmove", (e) => {
            e.preventDefault(); // Stop scrolling on mobile while playing
            movePlayer(e);
        }, { passive: false });

        cvs.addEventListener("click", () => {
            if (!gameActive) initGame();
        });
        cvs.addEventListener("touchstart", () => {
            if (!gameActive) initGame();
        });

        // Launch Game Button Logic
        playGameBtn.addEventListener('click', () => {
            playGameBtn.style.display = 'none';
            gameContainer.classList.add('show');
            if (!gameActive) initGame();
        });

        // --- BACKGROUND EFFECTS (Untouched, strictly optimized) ---
        (function() {
            const canvas = document.getElementById('ultra-promax-snow');
            const ctx = canvas.getContext('2d');
            
            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;

            const maxParticles = width < 768 ? 40 : 80; 
            let particles = [];
            const mouse = { x: -1000, y: -1000, radius: 180 };

            window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
            window.addEventListener('mouseout', () => { mouse.x = -1000; mouse.y = -1000; });
            window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });

            let windTime = 0;

            class UltraPremiumSnow {
                constructor() { this.reset(true); }
                reset(isInitial = false) {
                    this.x = Math.random() * width;
                    this.y = isInitial ? Math.random() * height : -20;
                    this.baseRadius = Math.random() * 2.5 + 1;
                    this.radius = this.baseRadius;
                    this.speedY = (Math.random() * 1.5 + 0.5) * (this.baseRadius * 0.4); 
                    this.speedX = Math.random() * 1 - 0.5;
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                    this.baseOpacity = Math.random() * 0.5 + 0.4;
                    this.opacity = this.baseOpacity;
                }
                update() {
                    this.wobble += this.wobbleSpeed;
                    const globalWind = Math.sin(windTime) * 0.5;
                    this.y += this.speedY;
                    this.x += this.speedX + Math.cos(this.wobble) * 0.5 + globalWind;
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x += (dx / distance) * force * 4;
                        this.y += (dy / distance) * force * 4;
                        this.opacity = Math.min(1, this.baseOpacity + force);
                    } else { this.opacity = this.baseOpacity; }

                    const distanceFromBottom = height - this.y;
                    if (distanceFromBottom < 100) { this.opacity = this.baseOpacity * (distanceFromBottom / 100); }
                    if (this.y > height || this.x < -50 || this.x > width + 50) { this.reset(false); }
                }
                draw() {
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 2);
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                    gradient.addColorStop(0.4, `rgba(180, 225, 255, ${this.opacity * 0.8})`);
                    gradient.addColorStop(1, `rgba(180, 225, 255, 0)`);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }

            function init() { particles = []; for (let i = 0; i < maxParticles; i++) { particles.push(new UltraPremiumSnow()); } }
            function animate() {
                ctx.clearRect(0, 0, width, height);
                windTime += 0.005; 
                for (let i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(); }
                requestAnimationFrame(animate);
            }

            init();
            animate();
        })();
    </script>
</body>
</html>
