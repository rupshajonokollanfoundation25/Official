<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইন্টারনেট সংযোগ বিচ্ছিন্ন</title>
    <style>
        /* প্রফেশনাল গুগল ফন্ট */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            /* ক্লিন ডার্ক সলিড ব্যাকগ্রাউন্ড */
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* মডার্ন ক্লিন কার্ড ডিজাইন (গ্লো ছাড়া) */
        .offline-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 45px 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
            animation: fadeIn 0.6s ease-out;
        }

        /* আইকন ডিজাইন (বিনা গ্লোতে স্মার্ট লুক) */
        .icon-wrapper {
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background-color: #334155; /* ডার্ক গ্রে ব্যাকগ্রাউন্ড */
            border-radius: 50%;
            animation: float 4s ease-in-out infinite;
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            stroke: #ef4444; /* সলিড রেড কালার, কোন গ্লো নেই */
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f1f5f9;
        }

        p {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* প্রফেশনাল সলিড বাটন */
        .retry-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Noto Sans Bengali', sans-serif;
            transition: background-color 0.2s ease, transform 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 200px;
        }

        .retry-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        /* লোডিং স্পিনার */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        /* সাকসেস টোস্ট মেসেজ (ক্লিন লুক) */
        .toast {
            position: fixed;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            bottom: 40px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
    </style>
</head>
<body>

    <div class="offline-card" id="card">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"></line>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                <line x1="12" y1="20" x2="12.01" y2="20"></line>
            </svg>
        </div>
        
        <h1>সংযোগ বিচ্ছিন্ন!</h1>
        <p>মনে হচ্ছে আপনার ইন্টারনেট কানেকশনটি বন্ধ আছে অথবা নেটওয়ার্ক সমস্যা হচ্ছে। দয়া করে কানেকশনটি চেক করুন।</p>
        
        <button class="retry-btn" id="retryBtn">
            <div class="spinner" id="btnSpinner"></div>
            <span id="btnText">পুনরায় চেষ্টা করুন</span>
        </button>
    </div>

    <!-- স্মার্ট সাকসেস মেসেজ -->
    <div class="toast" id="toast">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        ইন্টারনেট ফিরে এসেছে!
    </div>

    <script>
        const btn = document.getElementById('retryBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('btnSpinner');
        const toast = document.getElementById('toast');
        const card = document.getElementById('card');

        // কানেকশন চেক করার স্মার্ট ফাংশন
        async function checkConnection() {
            // বাটন লোডিং স্টেট
            btn.style.pointerEvents = 'none';
            btnText.textContent = 'চেক করা হচ্ছে...';
            spinner.style.display = 'block';

            // ফেক ডিলে (স্মুথ ইউজার এক্সপেরিয়েন্সের জন্য)
            await new Promise(resolve => setTimeout(resolve, 800));

            if (navigator.onLine) {
                showOnlineSuccess();
            } else {
                showOfflineError();
            }
        }

        // ইন্টারনেট কানেকশন সফল হলে
        function showOnlineSuccess() {
            btnText.textContent = 'কানেকশন সফল!';
            spinner.style.display = 'none';
            btn.style.backgroundColor = '#10b981'; // সলিড গ্রিন কালার
            
            toast.classList.add('show');
            
            // অটোমেটিক রিলোড
            setTimeout(() => {
                window.location.reload();
            }, 1500);
        }

        // ইন্টারনেট কানেকশন না পেলে (Error Animation)
        function showOfflineError() {
            btn.style.pointerEvents = 'auto';
            btnText.textContent = 'পুনরায় চেষ্টা করুন';
            spinner.style.display = 'none';
            
            // কার্ড শেক (Shake) অ্যানিমেশন
            card.animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-6px)' },
                { transform: 'translateX(6px)' },
                { transform: 'translateX(-6px)' },
                { transform: 'translateX(6px)' },
                { transform: 'translateX(0)' }
            ], { duration: 400, easing: 'ease-in-out' });
        }

        // বাটন ক্লিক ইভেন্ট
        btn.addEventListener('click', checkConnection);

        // অটোমেটিক অনলাইন ডিটেকশন 
        window.addEventListener('online', () => {
            showOnlineSuccess();
        });
    </script>











    <style>
    #ultra-promax-snow {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        pointer-events: none !important; /* ক্লিকে কোনো সমস্যা করবে না */
        z-index: 2147483647 !important;  /* ওয়েবসাইটের সবকিছুর ওপরে থাকবে */
        background: transparent !important;
    }
</style>

<canvas id="ultra-promax-snow"></canvas>

<script>
(function() {
    const canvas = document.getElementById('ultra-promax-snow');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    // পারফরম্যান্স ও প্রিমিয়াম লুকের জন্য স্মার্ট পার্টিকেল কাউন্ট
    const maxParticles = width < 768 ? 40 : 80; 
    let particles = [];

    // মাউস ফিজিক্স
    const mouse = { x: -1000, y: -1000, radius: 180 };

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mouseout', () => {
        mouse.x = -1000;
        mouse.y = -1000;
    });

    window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    });

    // গ্লোবাল উইন্ড ফিজিক্স (প্রাকৃতিক বাতাস)
    let windTime = 0;

    class UltraPremiumSnow {
        constructor() {
            this.reset(true);
        }

        reset(isInitial = false) {
            this.x = Math.random() * width;
            this.y = isInitial ? Math.random() * height : -20;
            
            // সাইজ: 3D লুকের জন্য একটু ভেরিয়েশন (1px থেকে 3.5px)
            this.baseRadius = Math.random() * 2.5 + 1;
            this.radius = this.baseRadius;
            
            // স্পিড এবং ফিজিক্স
            this.speedY = (Math.random() * 1.5 + 0.5) * (this.baseRadius * 0.4); 
            this.speedX = Math.random() * 1 - 0.5;
            this.wobble = Math.random() * Math.PI * 2;
            this.wobbleSpeed = Math.random() * 0.02 + 0.01;
            
            // আল্ট্রা-প্রিমিয়াম গ্লো এর জন্য অপাসিটি
            this.baseOpacity = Math.random() * 0.5 + 0.4;
            this.opacity = this.baseOpacity;
        }

        update() {
            // প্রাকৃতিক দুলুনি (Wobble) এবং গ্লোবাল বাতাস
            this.wobble += this.wobbleSpeed;
            const globalWind = Math.sin(windTime) * 0.5;
            
            this.y += this.speedY;
            this.x += this.speedX + Math.cos(this.wobble) * 0.5 + globalWind;

            // স্মুথ মাউস রিপালশন (Fluid Dynamics)
            const dx = this.x - mouse.x;
            const dy = this.y - mouse.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < mouse.radius) {
                const force = (mouse.radius - distance) / mouse.radius;
                // মাউসের ধাক্কায় স্মুথলি দূরে সরা
                this.x += (dx / distance) * force * 4;
                this.y += (dy / distance) * force * 4;
                
                // মাউসের কাছাকাছি এলে কণাগুলো একটু বেশি গ্লো করবে
                this.opacity = Math.min(1, this.baseOpacity + force);
            } else {
                this.opacity = this.baseOpacity;
            }

            // নিচে যাওয়ার সময় ধীরে ধীরে ফেড-আউট হওয়া
            const distanceFromBottom = height - this.y;
            if (distanceFromBottom < 100) {
                this.opacity = this.baseOpacity * (distanceFromBottom / 100);
            }

            // স্ক্রিনের বাইরে গেলে রিসেট
            if (this.y > height || this.x < -50 || this.x > width + 50) {
                this.reset(false);
            }
        }

        draw() {
            // 3D Radial Gradient (আল্ট্রা প্রিমিয়াম আইস-ব্লু লুক)
            const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 2);
            
            // মাঝখানে খাঁটি সাদা গ্লো
            gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
            // চারপাশে প্রিমিয়াম আইস-ব্লু বা ক্রিস্টাল আভা
            gradient.addColorStop(0.4, `rgba(180, 225, 255, ${this.opacity * 0.8})`);
            // শেষে স্বচ্ছ হয়ে যাওয়া
            gradient.addColorStop(1, `rgba(180, 225, 255, 0)`);

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }
    }

    function init() {
        particles = [];
        for (let i = 0; i < maxParticles; i++) {
            particles.push(new UltraPremiumSnow());
        }
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        windTime += 0.005; // বাতাসের গতি পরিবর্তন
        
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
        }
        requestAnimationFrame(animate);
    }

    init();
    animate();
})();
</script>








    <div class="premium-film-grain"></div>

<style>
    .premium-film-grain {
        position: fixed !important;
        /* স্ক্রিনের চেয়ে একটু বড় রাখা হয়েছে যাতে কাঁপলে চারপাশের বর্ডার দেখা না যায় */
        top: -100px !important;
        left: -100px !important;
        width: calc(100vw + 200px) !important;
        height: calc(100vh + 200px) !important;
        
        /* সম্পূর্ণ নিরাপদ: পেছনের কোনো বাটন বা স্ক্রল আটকাতে পারবে না */
        pointer-events: none !important;
        z-index: 2147483647 !important; /* সবার ওপরে থাকবে */
        
        /* আল্ট্রা-হাই কোয়ালিটি SVG ডিজিটাল নয়েজ */
        background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.80" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E') !important;
        
        /* প্রিমিয়াম ব্লেন্ডিং: ডার্ক এবং লাইট উভয় থিমেই এটি কালারের সাথে নিজেকে মানিয়ে নেবে */
        mix-blend-mode: overlay !important; 
        
        /* তীব্রতা: ০.০৪ হলো একদম ইন্টারন্যাশনাল স্ট্যান্ডার্ড (খুবই সূক্ষ্ম ও এলিগেন্ট) */
        opacity: 0.06 !important; 
        
        /* হার্ডওয়্যার বুস্ট (GPU ব্যবহার করবে, ফলে ব্রাউজার ল্যাগ করবে না) */
        will-change: transform;
        
        /* ২৪ ফ্রেমের সিনেমাটিক মোশন অ্যানিমেশন */
        animation: cinematic-jitter 0.3s steps(6) infinite !important;
    }

    /* 🎬 মুভি থিয়েটারের মতো র্যান্ডম জিটারিং ইফেক্ট */
    @keyframes cinematic-jitter {
        0% { transform: translate(0, 0); }
        10% { transform: translate(-1%, -1%); }
        20% { transform: translate(-2%, 1%); }
        30% { transform: translate(1%, -2%); }
        40% { transform: translate(-1%, 3%); }
        50% { transform: translate(-2%, 1%); }
        60% { transform: translate(2%, 0%); }
        70% { transform: translate(0%, 2%); }
        80% { transform: translate(3%, 1%); }
        90% { transform: translate(-1%, 1%); }
        100% { transform: translate(0, 0); }
    }
</style>

</body>
