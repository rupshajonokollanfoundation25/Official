<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Admin Pro - RJ Foundation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --accent-light: #eff6ff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body { 
            font-family: 'Hind Siliguri', 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            margin: 0; padding: 20px; color: #334155; min-height: 100vh;
        }

        .container { max-width: 950px; margin: 0 auto; }

        /* Modern Header */
        .admin-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            padding: 35px; border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--card-shadow); margin-bottom: 30px;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .header-top h1 { margin: 0; font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .btn-export { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); }
        .btn-export:hover { background: #059669; transform: translateY(-2px); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        
        /* Updated Stat Card */
        .stat-card { 
            background: white; padding: 20px; border-radius: 20px; 
            border: 2px solid transparent; transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            position: relative; overflow: hidden;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px rgba(0,0,0,0.05); }
        .stat-card.active { border-color: var(--accent); background: #f8fafc; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.1); transform: translateY(-4px); }
        .stat-card.active::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--accent); }
        #card-pending.active { border-color: var(--warning); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.1); }
        #card-pending.active::before { background: var(--warning); }
        #card-replied.active { border-color: var(--success); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.1); }
        #card-replied.active::before { background: var(--success); }

        .stat-card span { font-size: 13px; color: #64748b; font-weight: 700; margin-bottom: 5px; z-index: 1; }
        .stat-card strong { font-size: 32px; color: var(--primary); z-index: 1; line-height: 1; }

        /* Search */
        .search-container { margin-bottom: 25px; position: relative; }
        .search-bar { 
            width: 100%; padding: 16px 50px; border-radius: 20px; 
            border: 1px solid white; outline: none; font-family: inherit; 
            box-sizing: border-box; transition: 0.3s; font-size: 15px;
            box-shadow: var(--card-shadow);
        }
        .search-bar:focus { border-color: var(--accent); background: white; }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 18px; }

        /* Review Card */
        .review-card {
            background: white; border-radius: 24px; padding: 30px; margin-bottom: 25px;
            border: 2px solid rgba(226, 232, 240, 0.5); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden; box-shadow: var(--card-shadow);
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .review-card:hover { box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        
        .status-indicator { position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: var(--warning); transition: 0.3s; }
        .status-replied { background: var(--success); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 15px; }
        .avatar { 
            width: 55px; height: 55px; background: linear-gradient(135deg, #6366f1, #3b82f6); 
            color: white; border-radius: 18px; display: flex; align-items: center; 
            justify-content: center; font-weight: 700; font-size: 22px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); flex-shrink: 0;
        }
        
        .rating { color: #fbbf24; font-size: 14px; letter-spacing: 2px; }
        .comment-box { 
            background: #f8fafc; padding: 20px; border-radius: 18px; 
            font-size: 16px; line-height: 1.6; margin-bottom: 20px; 
            color: #334155; border: 1px solid #f1f5f9; word-break: break-word;
        }

        .btn-delete-full { 
            width: 35px; height: 35px; border-radius: 10px; color: #94a3b8; 
            background: #f8fafc; border: none; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .btn-delete-full:hover { background: #fee2e2; color: var(--danger); transform: rotate(90deg); }

        .template-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .chip { 
            background: white; padding: 7px 16px; border-radius: 12px; font-size: 13px; 
            cursor: pointer; border: 1px solid #e2e8f0; transition: 0.2s; font-weight: 500;
        }
        .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        .reply-area { border-top: 2px dashed #f1f5f9; padding-top: 25px; }
        .reply-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        .reply-input-wrapper { 
            display: flex; gap: 12px; background: #f8fafc; border: 2px solid #f1f5f9; 
            border-radius: 18px; padding: 10px; transition: 0.3s; align-items: flex-end;
        }
        .reply-input-wrapper:focus-within { border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.05); }
        .reply-text { flex: 1; border: none; outline: none; padding: 10px; font-family: inherit; font-size: 15px; resize: none; min-height: 24px; background: transparent; }
        
        .action-btn { 
            background: var(--accent); color: white; border: none; width: 48px; height: 48px; 
            border-radius: 14px; cursor: pointer; transition: 0.3s; display: flex; 
            align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); flex-shrink: 0;
        }
        .action-btn:hover { transform: scale(1.05); background: #2563eb; }

        .existing-reply { 
            background: #f0fdf4; border-radius: 18px; padding: 20px; 
            position: relative; border: 1px solid #dcfce7; animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .reply-content { font-size: 15px; color: #166534; margin: 0; line-height: 1.6; word-break: break-word; }
        .reply-actions { display: flex; gap: 20px; margin-top: 15px; }
        .reply-action-btn { background: none; border: none; font-size: 13px; font-weight: 700; cursor: pointer; color: #64748b; padding: 0; transition: 0.2s; }
        .reply-action-btn:hover { color: var(--accent); }

        #toast { 
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); 
            background: var(--primary); color: white; padding: 16px 32px; border-radius: 20px; 
            font-size: 14px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 9999;
        }
        #toast.show { bottom: 40px; }

        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
        .empty-state i { font-size: 48px; color: #cbd5e1; margin-bottom: 15px; }

        /* Skeleton Loader */
        .skeleton { background: #e2e8f0; border-radius: 4px; animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* Custom Modal Box */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9998; opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        
        .modal-box {
            background: white; width: 90%; max-width: 400px;
            border-radius: 24px; padding: 35px 30px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: translateY(20px) scale(0.95); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.show .modal-box { transform: translateY(0) scale(1); }

        .modal-icon {
            width: 65px; height: 65px; background: #fee2e2; color: var(--danger);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 28px; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }
        .modal-box h3 { margin: 0 0 12px; color: var(--primary); font-size: 22px; font-weight: 700; }
        .modal-box p { margin: 0 0 25px; color: #64748b; font-size: 15px; line-height: 1.5; font-weight: 400; }
        
        .modal-actions { display: flex; gap: 15px; justify-content: center; }
        .modal-actions button {
            flex: 1; padding: 14px; border-radius: 16px; font-weight: 600;
            font-size: 15px; cursor: pointer; transition: 0.2s; border: none; font-family: inherit;
        }
        .btn-cancel { background: #f1f5f9; color: #64748b; }
        .btn-cancel:hover { background: #e2e8f0; color: var(--primary); }
        .btn-confirm { background: var(--danger); color: white; }
        .btn-confirm:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(239, 68, 68, 0.25); }
    </style>
</head>
<body>

<div id="toast">প্রসেসিং হচ্ছে...</div>

<!-- Custom Smart Modal -->
<div id="custom-modal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-icon"><i class="fas fa-trash-alt"></i></div>
        <h3 id="modal-title">সতর্কতা</h3>
        <p id="modal-desc">আপনি কি নিশ্চিত?</p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">বাতিল করুন</button>
            <button class="btn-confirm" id="modal-confirm-btn">হ্যাঁ, ডিলিট করুন</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="admin-header">
        <div class="header-top">
            <h1><i class="fas fa-bolt" style="color: var(--warning);"></i> RJ Admin Pro</h1>
            <div class="header-actions">
                <div style="background: var(--accent-light); color: var(--accent); padding: 6px 15px; border-radius: 50px; font-size: 12px; font-weight: 800; text-transform: uppercase;">Live Engine</div>
                <button class="btn-export" onclick="exportData()" title="রিভিউ ডাটা JSON ফরম্যাটে ডাউনলোড করুন">
                    <i class="fas fa-file-download"></i> এক্সপোর্ট
                </button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card active" id="card-all" onclick="setFilter('all')">
                <span>মোট রিভিউ</span>
                <strong id="totalCount">0</strong>
            </div>
            <div class="stat-card" id="card-pending" onclick="setFilter('pending')">
                <span>বাকি আছে</span>
                <strong id="pendingCount" style="color: var(--warning);">0</strong>
            </div>
            <div class="stat-card" id="card-replied" onclick="setFilter('replied')">
                <span>রিপ্লাইড</span>
                <strong id="repliedCount" style="color: var(--success);">0</strong>
            </div>
        </div>
    </div>

    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-bar" placeholder="ইউজার নেম, ইমেইল বা কমেন্টের কিওয়ার্ড দিয়ে খুঁজুন..." onkeyup="applyFilters()">
    </div>

    <div id="reviewList">
        <div class="review-card">
            <div class="card-header">
                <div style="display:flex; gap:15px; flex: 1; min-width: 0;">
                    <div class="skeleton" style="width:55px; height:55px; border-radius:18px;"></div>
                    <div style="flex: 1;">
                        <div class="skeleton" style="width:120px; height:16px; margin-bottom:8px;"></div>
                        <div class="skeleton" style="width:80px; height:12px; margin-bottom:8px;"></div>
                        <div class="skeleton" style="width:150px; height:10px;"></div>
                    </div>
                </div>
            </div>
            <div class="skeleton" style="width:100%; height:60px; border-radius:10px;"></div>
        </div>
    </div>
</div>

<script>
    const reviewConfig = {
        apiKey: "AIzaSyDC0H-DW3avFnMRmipaI3qSyYLnb2B3CEU",
        authDomain: "rating-revieww.firebaseapp.com",
        projectId: "rating-revieww",
        appId: "1:936802340652:web:9283ff8a9ffcbee6686689"
    };
    firebase.initializeApp(reviewConfig);
    const db = firebase.firestore();

    let currentFilter = 'all';
    let globalDataForExport = [];

    // Custom Modal Engine
    let modalConfirmAction = null;

    function showModal(title, desc, action) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc;
        modalConfirmAction = action;
        document.getElementById('custom-modal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('custom-modal').classList.remove('show');
        modalConfirmAction = null;
    }

    document.getElementById('modal-confirm-btn').addEventListener('click', () => {
        if (modalConfirmAction) modalConfirmAction();
        closeModal();
    });

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerHTML = `<i class="fas fa-info-circle"></i> &nbsp; ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Time Ago Function
    function timeSince(dateInput) {
        if (!dateInput) return 'সময় অজানা';
        let date = dateInput.toDate ? dateInput.toDate() : new Date(dateInput);
        const seconds = Math.floor((new Date() - date) / 1000);
        
        let interval = seconds / 31536000;
        if (interval > 1) return Math.floor(interval) + " বছর আগে";
        interval = seconds / 2592000;
        if (interval > 1) return Math.floor(interval) + " মাস আগে";
        interval = seconds / 86400;
        if (interval > 1) return Math.floor(interval) + " দিন আগে";
        interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + " ঘণ্টা আগে";
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + " মিনিট আগে";
        return "এইমাত্র";
    }

    function useTemplate(docId, msg) {
        const input = document.getElementById(`reply-${docId}`);
        if(input) {
            input.value = msg;
            input.focus();
            input.style.height = input.scrollHeight + 'px';
        }
    }

    function setFilter(filterType) {
        currentFilter = filterType;
        document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('active'));
        document.getElementById(`card-${filterType}`).classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.review-card');
        let visibleCount = 0;

        cards.forEach(card => {
            const searchContent = card.getAttribute('data-search');
            const status = card.getAttribute('data-status');
            
            let textMatch = searchContent.includes(q);
            let statusMatch = true;
            
            if (currentFilter === 'pending') statusMatch = (status === 'pending');
            else if (currentFilter === 'replied') statusMatch = (status === 'replied');
            
            if (textMatch && statusMatch) {
                card.style.display = 'block';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });

        let emptyDiv = document.getElementById('empty-filter-state');
        if (visibleCount === 0 && cards.length > 0) {
            if (!emptyDiv) {
                emptyDiv = document.createElement('div');
                emptyDiv.id = 'empty-filter-state';
                emptyDiv.className = 'empty-state';
                emptyDiv.innerHTML = '<i class="fas fa-search-minus"></i><br><b>কোনো ডাটা পাওয়া যায়নি!</b>';
                document.getElementById('reviewList').appendChild(emptyDiv);
            }
        } else if (emptyDiv) {
            emptyDiv.remove();
        }
    }

    function initAdminPanel() {
        db.collection("reviews").onSnapshot(snapshot => {
            const list = document.getElementById('reviewList');
            let html = "";
            let replied = 0;
            let pending = 0;
            globalDataForExport = [];

            if (snapshot.empty) {
                list.innerHTML = `<div class="empty-state"><i class="far fa-folder-open"></i><br>এখনও কোনো রিভিউ জমা পড়েনি!</div>`;
                return;
            }

            const sortedDocs = [];
            snapshot.forEach(doc => {
                const docData = doc.data();
                sortedDocs.push({ id: doc.id, ...docData });
                
                // Prepare raw data for JSON Export
                globalDataForExport.push({
                    id: doc.id,
                    userName: docData.userName || "Unknown",
                    email: docData.userEmail || "N/A",
                    rating: docData.rating || 0,
                    comment: docData.comment || "",
                    adminReply: docData.adminReply || null,
                    timestamp: docData.timestamp ? new Date(docData.timestamp.toDate()).toISOString() : null
                });
            });
            
            sortedDocs.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            sortedDocs.forEach(data => {
                const id = data.id;
                const hasReply = !!data.adminReply;
                if(hasReply) replied++; else pending++;

                const stars = '<i class="fas fa-star"></i>'.repeat(data.rating || 0) + '<i class="far fa-star" style="color:#e2e8f0"></i>'.repeat(5 - (data.rating || 0));
                const initial = data.userName ? data.userName.charAt(0).toUpperCase() : '?';
                const statusType = hasReply ? 'replied' : 'pending';
                const timeStr = timeSince(data.timestamp);

                // Sentiment Analysis Engine
                const badWords = ['বাজে', 'খারাপ', 'ফালতু', 'জঘন্য', 'সমস্যা', 'ভুল', 'bad', 'worst'];
                const goodWords = ['অসাধারণ', 'খুব ভালো', 'দারুণ', 'ধন্যবাদ', 'সেরা', 'উপকারী', 'good', 'best', 'awesome'];
                let sentimentStyle = '';
                let sentimentBadge = '';
                const commentText = (data.comment || '').toLowerCase();

                if (badWords.some(word => commentText.includes(word))) {
                    sentimentStyle = 'border-color: #fca5a5;';
                    sentimentBadge = '<span style="font-size:10px; background:var(--danger); color:white; padding:2px 6px; border-radius:6px; margin-top:2px;">⚠️ নেগেটিভ</span>';
                } else if (goodWords.some(word => commentText.includes(word)) || data.rating >= 4) {
                    sentimentBadge = '<span style="font-size:10px; background:var(--success); color:white; padding:2px 6px; border-radius:6px; margin-top:2px;">🌟 পজিটিভ</span>';
                }

                html += `
                    <div class="review-card" style="${sentimentStyle}" data-search="${(data.userName || '').toLowerCase()} ${(data.userEmail || '').toLowerCase()} ${(data.comment || '').toLowerCase()}" data-status="${statusType}">
                        <div class="status-indicator ${hasReply ? 'status-replied' : ''}"></div>
                        <div class="card-header">
                            <div class="user-info" style="display:flex; align-items:flex-start; gap:15px; flex: 1; min-width: 0; padding-right: 10px;">
                                <div class="avatar">${initial}</div>
                                <div style="flex: 1; min-width: 0;">
                                    <div style="font-weight:700; color: var(--primary); font-size:17px; line-height: 1.4; display: flex; flex-wrap: wrap; align-items: center; gap: 8px;">
                                        <span style="word-break: break-word; overflow-wrap: break-word; max-width: 100%;">${data.userName || 'অচেনা ইউজার'}</span> 
                                        ${sentimentBadge}
                                    </div>
                                    
                                    <div class="rating" style="margin-top: 5px; margin-bottom: 3px;">${stars}</div>
                                    
                                    <div style="font-size:12px; color: #64748b; font-weight:500; word-break: break-word;">
                                        ${data.userEmail || 'ইমেইল তথ্য নেই'} &bull; <i class="far fa-clock"></i> ${timeStr}
                                    </div>
                                </div>
                            </div>
                            <button class="btn-delete-full" title="পুরো রিভিউ ডিলিট করুন" onclick="deleteFullReview('${id}')">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>

                        <div class="comment-box">${data.comment || 'মতামত নেই'}</div>

                        <div class="reply-area">
                            <div class="reply-title">
                                <i class="fas fa-reply-all" style="color:var(--accent)"></i> ${hasReply ? 'মডারেটর রেসপন্স' : 'দ্রুত রিপ্লাই'}
                            </div>

                            ${hasReply ? `
                                <div class="existing-reply">
                                    <p class="reply-content" id="content-${id}">${data.adminReply}</p>
                                    <div class="reply-actions">
                                        <button class="reply-action-btn" onclick="editMode('${id}', \`${data.adminReply.replace(/`/g, "\\`")}\`)"><i class="fas fa-edit"></i> এডিট</button>
                                        <button class="reply-action-btn" style="color:#f87171" onclick="deleteReply('${id}')"><i class="fas fa-eraser"></i> রিমুভ</button>
                                    </div>
                                </div>
                            ` : `
                                <div class="template-row">
                                    <div class="chip" onclick="useTemplate('${id}', 'আমাদের সাথে থাকার জন্য আপনাকে অনেক ধন্যবাদ!')">ধন্যবাদ</div>
                                    <div class="chip" onclick="useTemplate('${id}', 'আপনার মূল্যবান মতামতের জন্য আমরা কৃতজ্ঞ।')">কৃতজ্ঞতা</div>
                                    <div class="chip" onclick="useTemplate('${id}', 'আপনার বিষয়টি আমরা গুরুত্ব দিয়ে দেখছি।')">তদন্ত</div>
                                </div>
                                <div class="reply-input-wrapper">
                                    <textarea id="reply-${id}" class="reply-text" placeholder="ইউজারের উদ্দেশ্যে কিছু লিখুন..." rows="1" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                                    <button onclick="sendReply('${id}')" class="action-btn" id="btn-${id}">
                                        <i class="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                            `}
                        </div>
                    </div>
                `;
            });

            document.getElementById('totalCount').innerText = snapshot.size;
            document.getElementById('pendingCount').innerText = pending;
            document.getElementById('repliedCount').innerText = replied;
            
            list.innerHTML = html;
            applyFilters();

        }, error => {
            console.error("Firebase Error: ", error);
            document.getElementById('reviewList').innerHTML = `<div style="color:var(--danger); text-align:center; padding:50px; background:white; border-radius:20px;">Firebase সংযোগ বিচ্ছিন্ন। সঠিক API Key এবং Rules নিশ্চিত করুন।</div>`;
        });
    }

    // JSON Export Feature
    function exportData() {
        if(globalDataForExport.length === 0) {
            showToast("এক্সপোর্ট করার মতো কোনো ডাটা নেই!");
            return;
        }
        
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(globalDataForExport, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href",     dataStr);
        downloadAnchorNode.setAttribute("download", "reviews_export_" + new Date().getTime() + ".json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
        showToast("ডাটা এক্সপোর্ট সম্পন্ন হয়েছে!");
    }

    async function sendReply(docId) {
        const text = document.getElementById(`reply-${docId}`).value.trim();
        const btn = document.getElementById(`btn-${docId}`);
        if(!text) { showToast("খালি রিপ্লাই পাঠানো সম্ভব নয়!"); return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

        try {
            await db.collection("reviews").doc(docId).update({ adminReply: text });
            showToast("রিপ্লাই সফলভাবে সেভ হয়েছে!");
        } catch (e) {
            showToast("সেভ করতে সমস্যা হয়েছে!");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        }
    }

    function editMode(docId, oldText) {
        const container = document.getElementById(`content-${docId}`).parentElement;
        container.innerHTML = `
            <div class="reply-input-wrapper" style="border-color: var(--accent); background: white;">
                <textarea id="reply-${docId}" class="reply-text" rows="2">${oldText}</textarea>
                <button onclick="sendReply('${docId}')" class="action-btn" id="btn-${docId}">
                    <i class="fas fa-check"></i>
                </button>
            </div>
            <button class="reply-action-btn" style="margin-top:10px; color:var(--danger)" onclick="initAdminPanel()">বাতিল করুন</button>
        `;
        const ta = document.getElementById(`reply-${docId}`);
        ta.focus();
        ta.style.height = ta.scrollHeight + 'px';
    }

    // Updated Delete Functions with Smart Modal
    function deleteReply(docId) {
        showModal("রিপ্লাই ডিলিট", "রিপ্লাইটি কি ডিলিট করতে চান? মূল রিভিউটি ডিলিট হবে না।", async () => {
            try {
                await db.collection("reviews").doc(docId).update({ adminReply: firebase.firestore.FieldValue.delete() });
                showToast("রিপ্লাই মুছে ফেলা হয়েছে।");
            } catch (e) { showToast("মুছতে এরর হয়েছে!"); }
        });
    }

    function deleteFullReview(docId) {
        showModal("পুরো রিভিউ ডিলিট", "সাবধান! এই রিভিউটি চিরতরে ডিলিট হয়ে যাবে। আপনি কি নিশ্চিত?", async () => {
            try {
                await db.collection("reviews").doc(docId).delete();
                showToast("পুরো রিভিউ মুছে ফেলা হয়েছে।");
            } catch (e) { showToast("মডারেটর অ্যাকশন ব্যর্থ!"); }
        });
    }

    initAdminPanel();
</script>

</body>
</html>
