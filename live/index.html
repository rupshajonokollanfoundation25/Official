<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProMax Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <!-- আইকন এবং PeerJS ক্লাউড লাইব্রেরি -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

    <!-- ব্যাকগ্রাউন্ড গ্লোবাল লোডার ইন্টারফেস -->
    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
    </div>

    <!-- প্রো ম্যাক্স টোস্ট নোটিফিকেশন বক্স -->
    <div id="toast" class="toast">
        <i id="toast-icon" class="fa-solid"></i>
        <span id="toast-msg">নোটিফিকেশন মেসেজ</span>
    </div>

    <!-- ================= লগইন ইন্টারফেস ================= -->
    <main id="login-section" class="screen-container active">
        <div class="glass-card login-box">
            <div class="icon-header">
                <i class="fa-solid fa-fingerprint"></i>
            </div>
            <h2>অ্যাডমিন অ্যাক্সেস</h2>
            <p class="subtitle">শুধুমাত্র অনুমোদিত ইমেইল গ্রহণ করা হবে</p>

            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email-input" placeholder="অ্যাডমিন ইমেইল দিন">
            </div>
            
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password-input" placeholder="পাসওয়ার্ড দিন">
            </div>

            <div class="forgot-pass">
                <span id="btn-forgot-password">পাসওয়ার্ড ভুলে গেছেন?</span>
            </div>

            <button id="btn-login-email" class="btn-primary">
                <i class="fa-solid fa-right-to-bracket"></i> লগইন করুন
            </button>

            <div class="divider"><span>OR</span></div>

            <button id="btn-login-google" class="btn-google">
                <i class="fa-brands fa-google"></i> Google দিয়ে লগইন
            </button>
        </div>
    </main>

    <!-- ================= ড্যাশবোর্ড ইন্টারফেস ================= -->
    <main id="dashboard-section" class="screen-container hidden">
        <div class="dashboard-layout">
            
            <!-- টপ নেভিগেশন বার (প্রোফাইল বক্স ফিক্সড) -->
            <nav class="top-nav glass-card">
                <div class="brand">
                    <i class="fa-solid fa-satellite-dish"></i> ProMax Live
                </div>
                
                <!-- নতুন রি-ডিজাইন করা স্মার্ট প্রোফাইল উইজেট বক্স -->
                <div class="profile-widget">
                    <img id="user-photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile">
                    <div class="profile-info">
                        <h4 id="user-name">Pro Admin</h4>
                        <span class="badge">Verified <i class="fa-solid fa-circle-check"></i></span>
                    </div>
                    <button id="btn-logout" class="btn-logout" title="লগআউট">
                        <i class="fa-solid fa-power-off"></i>
                    </button>
                </div>
            </nav>

            <!-- মেইন ব্রডকাস্ট কন্ট্রোল রুম -->
            <div class="control-panel glass-card">
                <div class="status-indicator">
                    <div class="pulse-ring"></div>
                    <i class="fa-solid fa-tower-broadcast"></i>
                </div>
                <h2>ব্রডকাস্ট কন্ট্রোল রুম</h2>
                
                <div class="id-display">
                    <span>আপনার রিয়েল-টাইম আইডি:</span>
                    <strong id="my-id">কানেক্ট হচ্ছে...</strong>
                </div>
                
                <div class="action-area">
                    <button id="btn-start-live" class="btn-glow">
                        <i class="fa-solid fa-desktop"></i> লাইভ স্ক্রিন শেয়ার শুরু করুন
                    </button>
                   
                </div>
            </div>

        </div>
    </main>

    <!-- ব্যাকএন্ড স্ক্রিপ্ট মডিউল -->
    <script type="module" src="script.js"></script>
</body>
</html>
