<!DOCTYPE html>
<html lang="bn" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Member Verification | RJF</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: { sans: ['Hind Siliguri', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdfa', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' }
                    }
                }
            }
        }
    </script>
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        body { 
            background: linear-gradient(135deg, #e0f2fe 0%, #f3f4f6 100%);
            min-height: 100vh;
            transition: background 0.3s ease;
        }
        @media (prefers-color-scheme: dark) {
            body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); 
        }
        @media (prefers-color-scheme: dark) {
            .glass-card {
                background: rgba(30, 41, 59, 0.9);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        }

        .watermark {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 5rem;
            font-weight: 800;
            color: rgba(20, 184, 166, 0.05);
            pointer-events: none;
            white-space: nowrap;
            z-index: 0;
        }

        /* Animations */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-pop-in { animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .skeleton { animation: pulse 1.5s infinite; border-radius: 8px; background: #e2e8f0; }
        @media (prefers-color-scheme: dark) { .skeleton { background: #334155; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- 1. Search & Scan Card -->
    <div id="search-card" class="hidden animate-pop-in glass-card max-w-md w-full p-8 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
        <div class="w-20 h-20 bg-blue-50 dark:bg-slate-700 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
            <i class="fas fa-shield-check text-blue-500 text-4xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">স্মার্ট ভেরিফিকেশন</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">আইডি লিখুন অথবা কার্ড স্ক্যান করুন</p>
        
        <!-- Scanner Area -->
        <div id="qr-reader" class="mb-4 hidden rounded-xl overflow-hidden border-2 border-dashed border-blue-300"></div>
        
        <div class="flex gap-2 mb-4">
            <button id="start-scan-btn" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-3 rounded-xl font-bold hover:bg-slate-200 transition flex items-center justify-center gap-2">
                <i class="fas fa-qrcode"></i> স্ক্যান করুন
            </button>
        </div>

        <form id="search-form" class="space-y-4">
            <input type="text" id="search-input" placeholder="Enter Member ID (e.g. RJF1001)" required
                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase tracking-wider text-center font-bold">
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl font-bold hover:shadow-lg transition duration-200 flex justify-center items-center gap-2">
                <i class="fas fa-arrow-right"></i> ভেরিফাই
            </button>
        </form>
    </div>

    <!-- 2. Loader Card -->
    <div id="loader" class="hidden glass-card max-w-md w-full p-8 text-center">
        <div class="relative w-24 h-24 mx-auto mb-4">
            <div class="absolute inset-0 border-4 border-t-blue-500 border-blue-100 dark:border-slate-700 rounded-full animate-spin"></div>
            <i class="fas fa-fingerprint absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-3xl text-blue-500"></i>
        </div>
        <h2 class="text-lg font-bold text-gray-700 dark:text-gray-300">ডাটাবেস চেক করা হচ্ছে...</h2>
    </div>

    <!-- 3. Verified Digital ID Card -->
    <div id="verified-wrapper" class="hidden w-full max-w-md space-y-4 animate-pop-in">
        
        <!-- The Downloadable Card Element -->
        <div id="id-card-element" class="glass-card p-6 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-brand-500 to-emerald-500"></div>
            <div class="watermark">VERIFIED RJF</div>
            
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-4 border-b border-gray-200 dark:border-gray-700 pb-4">
                    <div class="flex items-center gap-3">
                        <img src="rjf.webp" onerror="this.style.display='none'" alt="Logo" class="w-10 h-10 rounded-full shadow-sm">
                        <div>
                            <h2 class="text-sm font-bold text-gray-800 dark:text-white uppercase">Rupsha Jonokollan</h2>
                            <p class="text-[10px] text-gray-500 dark:text-gray-400">Foundation (RJF)</p>
                        </div>
                    </div>
                    <div class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-xs font-bold flex items-center gap-1 shadow-sm">
                        <i class="fas fa-circle-check"></i> Verified
                    </div>
                </div>

                <div class="flex gap-4">
                    <!-- Profile Pic -->
                    <div class="w-24 h-24 shrink-0 rounded-xl overflow-hidden border-2 border-brand-500 shadow-md">
                        <img id="profile-img" src="" alt="Profile" class="w-full h-full object-cover bg-slate-100">
                    </div>
                    
                    <!-- Short Info -->
                    <div class="flex-1">
                        <h1 class="text-xl font-bold text-gray-900 dark:text-white leading-tight" id="member-name-title">---</h1>
                        <p class="text-brand-600 dark:text-brand-400 text-sm font-semibold mb-2" id="member-designation">---</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 font-mono bg-gray-100 dark:bg-slate-800 inline-block px-2 py-1 rounded">ID: <span id="display-id" class="font-bold text-gray-800 dark:text-white">---</span></p>
                    </div>
                </div>

                <div id="member-info-container" class="mt-5 space-y-2 text-sm">
                    <!-- Dynamic Rows -->
                </div>

                <!-- QR Section -->
                <div class="mt-5 pt-4 border-t border-dashed border-gray-300 dark:border-gray-600 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase tracking-wider font-bold">Official Scan Code</p>
                        <p class="text-[9px] text-gray-400">Valid on RJF Database</p>
                    </div>
                    <img id="qr-code-img" src="" alt="QR" class="w-12 h-12 bg-white p-0.5 rounded shadow-sm">
                </div>
            </div>
        </div>

        <!-- Action Buttons (Won't be downloaded) -->
        <div class="grid grid-cols-2 gap-3 no-print">
            <button id="download-btn" class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 py-3 rounded-xl font-bold hover:scale-105 transition flex items-center justify-center gap-2 shadow-lg">
                <i class="fas fa-download"></i> কার্ড সেভ করুন
            </button>
            <button id="share-btn" class="bg-blue-100 text-blue-700 py-3 rounded-xl font-bold hover:bg-blue-200 transition flex items-center justify-center gap-2 shadow-sm">
                <i class="fas fa-share-nodes"></i> শেয়ার করুন
            </button>
            <a href="https://rupshajonokollanfoundation.vercel.app" class="col-span-2 bg-gradient-to-r from-brand-500 to-emerald-500 text-white py-3 rounded-xl font-bold hover:shadow-lg transition text-center shadow-md">
                <i class="fas fa-house mr-2"></i> হোম পেজে ফিরে যান
            </a>
        </div>
    </div>

    <!-- 4. Error Card -->
    <div id="error-card" class="hidden animate-pop-in glass-card max-w-md w-full p-8 text-center">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-500 to-rose-600"></div>
        <div class="bg-red-50 dark:bg-red-900/30 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-triangle-exclamation text-red-500 text-5xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">ডাটা পাওয়া যায়নি!</h1>
        <p id="error-message" class="text-sm text-gray-600 dark:text-gray-300 mb-6 bg-red-50 dark:bg-red-900/20 p-3 rounded-lg">
            আইডিটি সঠিক নয় অথবা ডাটাবেসে নেই।
        </p>
        <button onclick="window.location.href=window.location.pathname" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-700 transition">
            <i class="fas fa-rotate-right mr-2"></i> আবার চেষ্টা করুন
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-ke7FIUPX5Ksow8vJQ4axmGAIdiKd49Q",
            authDomain: "member-selection.firebaseapp.com",
            projectId: "member-selection",
            storageBucket: "member-selection.firebasestorage.app",
            messagingSenderId: "434008909239",
            appId: "1:434008909239:web:a790d1e0603ebfdbd27432"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let html5QrcodeScanner = null;

        // --- Utilities ---
        const getMemberId = () => {
            const urlParams = new URLSearchParams(window.location.search);
            let id = urlParams.get('id');
            if (!id) {
                const pathParts = window.location.pathname.split('/');
                id = pathParts[pathParts.length - 1];
                if(['verify.html', ''].includes(id)) return null;
            }
            return id ? id.trim().toUpperCase() : null; 
        };

        const maskMobile = (number) => (!number || number.length < 11) ? number : number.substring(0, 3) + '*****' + number.substring(number.length - 3);

        const playHapticAndVoice = (name) => {
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Haptic
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance(`Verification successful. Welcome, ${name}`);
                msg.lang = 'en-US';
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }
        };

        const generateAvatar = (name) => `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=0D9488&color=fff&size=256&bold=true`;

        const showView = (viewId) => {
            ['search-card', 'loader', 'verified-wrapper', 'error-card'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        };

        // --- Core Logic ---
        async function verifyMember() {
            const memberId = getMemberId();
            if (!memberId || memberId === 'VERIFY') return showView('search-card');

            showView('loader');
            const cachedData = sessionStorage.getItem(`rjf_member_${memberId}`);
            if (cachedData) return setTimeout(() => showSuccess(JSON.parse(cachedData)), 500);

            try {
                const q = query(collection(db, "members"), where("member_id", "==", memberId));
                const querySnapshot = await getDocs(q);

                setTimeout(() => {
                    if (querySnapshot.empty) {
                        showError(`আইডি <strong>${memberId}</strong> ডাটাবেসে নেই।`);
                    } else {
                        const data = querySnapshot.docs[0].data();
                        sessionStorage.setItem(`rjf_member_${memberId}`, JSON.stringify(data));
                        showSuccess(data);
                    }
                }, 1000);
            } catch (error) {
                showError("সার্ভারের সমস্যা। ইন্টারনেট কানেকশন চেক করুন।");
            }
        }

        function showSuccess(data) {
            showView('verified-wrapper');
            playHapticAndVoice(data.full_name);
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#14b8a6', '#10b981', '#3b82f6'] });
            
            document.title = `Verified: ${data.full_name} | RJF`;
            document.getElementById('display-id').innerText = data.member_id || getMemberId();
            document.getElementById('member-name-title').innerText = data.full_name;
            document.getElementById('member-designation').innerText = data.membership_type || 'General Member';
            
            // Smart Avatar Logic
            document.getElementById('profile-img').src = data.photo_url ? data.photo_url : generateAvatar(data.full_name);

            const currentUrl = window.location.origin + window.location.pathname + '?id=' + (data.member_id || getMemberId());
            document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(currentUrl)}&margin=1`;

            const infoContainer = document.getElementById('member-info-container');
            const createRow = (icon, label, value) => `
                <div class="flex justify-between items-center bg-white/40 dark:bg-slate-800/40 p-2 rounded">
                    <span class="text-gray-500 dark:text-gray-400 text-xs"><i class="fas ${icon} w-4"></i> ${label}</span>
                    <span class="font-bold text-gray-800 dark:text-gray-200 text-sm">${value || '---'}</span>
                </div>
            `;
            infoContainer.innerHTML = `
                ${createRow('fa-droplet text-red-500', 'ব্লাড গ্রুপ', data.blood_group)}
                ${createRow('fa-phone text-blue-500', 'মোবাইল', maskMobile(data.mobile_number))}
                ${createRow('fa-briefcase text-amber-600', 'পেশা', data.occupation)}
            `;

            // Download Logic (html2canvas)
            document.getElementById('download-btn').onclick = () => {
                const card = document.getElementById('id-card-element');
                // Temporary remove rounded corners for clean square export if needed
                html2canvas(card, { scale: 3, useCORS: true, backgroundColor: null }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `RJF_ID_${data.member_id}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            };

            // Share Logic
            document.getElementById('share-btn').onclick = () => {
                if (navigator.share) {
                    navigator.share({ title: 'RJF Verified Profile', text: 'View Verified Member Profile', url: currentUrl });
                } else {
                    navigator.clipboard.writeText(currentUrl); alert('লিংক কপি হয়েছে!');
                }
            };
        }

        function showError(msg) { showView('error-card'); if (msg) document.getElementById('error-message').innerHTML = msg; }

        // --- QR Scanner Implementation ---
        document.getElementById('start-scan-btn').addEventListener('click', () => {
            const qrReaderArea = document.getElementById('qr-reader');
            qrReaderArea.classList.remove('hidden');
            
            if(!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode("qr-reader");
                html5QrcodeScanner.start(
                    { facingMode: "environment" }, // Rear camera
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        html5QrcodeScanner.stop();
                        qrReaderArea.classList.add('hidden');
                        
                        // Extract ID if URL is scanned, or use direct text
                        try {
                            const url = new URL(decodedText);
                            const id = url.searchParams.get('id');
                            window.location.href = window.location.pathname + '?id=' + encodeURIComponent(id || decodedText);
                        } catch(e) {
                            window.location.href = window.location.pathname + '?id=' + encodeURIComponent(decodedText);
                        }
                    },
                    (error) => { /* Ignore regular frame scanning errors */ }
                ).catch(err => {
                    alert("ক্যামেরা ওপেন করা যাচ্ছে না। পারমিশন দিন।");
                });
            }
        });

        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const val = document.getElementById('search-input').value.trim();
            if(val) window.location.href = window.location.pathname + '?id=' + encodeURIComponent(val);
        });

        document.addEventListener('DOMContentLoaded', verifyMember);
    </script>
</body>
</html>
