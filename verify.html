<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Verification - Rupsha Jonokollan Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f3f4f6; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="loader" class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-teal-700 mx-auto"></div>
        <p class="mt-4 text-gray-600">তথ্য যাচাই করা হচ্ছে...</p>
    </div>

    <div id="verified-card" class="hidden glass-card max-w-md w-full p-8 text-center border-t-8 border-teal-700">
        <div class="bg-teal-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-check-circle text-teal-700 text-4xl"></i>
        </div>
        
        <h1 class="text-2xl font-bold text-gray-800 mb-2">সদস্যপদ নিশ্চিত!</h1>
        <p class="text-gray-500 mb-6 border-b pb-4">রুপসা জনকল্যাণ ফাউন্ডেশন এই সদস্যপদটি সফলভাবে ভেরিফাই করেছে।</p>

        <div class="space-y-4 text-left">
            <div class="flex justify-between border-b pb-2">
                <span class="text-gray-500">সদস্য আইডি:</span>
                <span id="display-id" class="font-bold text-teal-800 uppercase tracking-widest">---</span>
            </div>
            <div id="member-info-container" class="space-y-4 pt-2">
                </div>
        </div>

        <div class="mt-8">
            <a href="https://rupshajonokollanfoundation.vercel.app" class="inline-block bg-teal-700 text-white px-6 py-2 rounded-full font-semibold hover:bg-teal-800 transition">হোম পেজে যান</a>
        </div>
    </div>

    <div id="error-card" class="hidden glass-card max-w-md w-full p-8 text-center border-t-8 border-red-600">
        <i class="fas fa-exclamation-triangle text-red-600 text-5xl mb-4"></i>
        <h1 class="text-2xl font-bold text-gray-800">ত্রুটি!</h1>
        <p class="text-gray-600 mt-2">দুঃখিত, এই মেম্বার আইডিটি সঠিক নয় অথবা আমাদের ডাটাবেসে নেই।</p>
        <a href="https://rupshajonokollanfoundation.vercel.app" class="mt-6 inline-block text-teal-700 font-bold underline">ফিরে যান</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        // Firebase Config (আপনার দেওয়া কনফিগ)
        const firebaseConfig = {
            apiKey: "AIzaSyC-ke7FIUPX5Ksow8vJQ4axmGAIdiKd49Q",
            authDomain: "member-selection.firebaseapp.com",
            projectId: "member-selection",
            storageBucket: "member-selection.firebasestorage.app",
            messagingSenderId: "434008909239",
            appId: "1:434008909239:web:a790d1e0603ebfdbd27432",
            measurementId: "G-JVMKJZLCC5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // URL থেকে ID সংগ্রহ করার লজিক
        // এটি ?id=RJF... অথবা /verify/RJF... উভয় ক্ষেত্রেই কাজ করার চেষ্টা করবে
        const getMemberId = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('id')) return urlParams.get('id');
            
            const pathParts = window.location.pathname.split('/');
            return pathParts[pathParts.length - 1];
        };

        const memberId = getMemberId();

        async function verifyMember() {
            if (!memberId || memberId === 'verify' || memberId === '') {
                showError();
                return;
            }

            try {
                // ডাটাবেসে member_id ফিল্ডের সাথে মিলিয়ে দেখা হচ্ছে
                const q = query(collection(db, "members"), where("member_id", "==", memberId));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    showError();
                } else {
                    const memberData = querySnapshot.docs[0].data();
                    showSuccess(memberData);
                }
            } catch (error) {
                console.error("Verification Error:", error);
                showError();
            }
        }

        function showSuccess(data) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('verified-card').classList.remove('hidden');
            document.getElementById('display-id').innerText = data.member_id;
            
            // তথ্যগুলো সাজিয়ে দেখানো
            const infoContainer = document.getElementById('member-info-container');
            infoContainer.innerHTML = `
                <div class="flex justify-between border-b pb-2">
                    <span class="text-gray-500">নাম:</span>
                    <span class="font-semibold text-gray-800">${data.full_name}</span>
                </div>
                <div class="flex justify-between border-b pb-2">
                    <span class="text-gray-500">পেশা:</span>
                    <span class="font-semibold text-gray-800">${data.occupation || 'N/A'}</span>
                </div>
                <div class="flex justify-between border-b pb-2">
                    <span class="text-gray-500">সদস্যপদ:</span>
                    <span class="font-semibold text-teal-700">${data.membership_type}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-500">রক্তের গ্রুপ:</span>
                    <span class="font-bold text-red-600">${data.blood_group || 'N/A'}</span>
                </div>
            `;
        }

        function showError() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('error-card').classList.remove('hidden');
        }

        // ভেরিফিকেশন শুরু
        verifyMember();
    </script>
</body>
</html>
