<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Verification | Rupsha Jonokollan Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            /* Modern subtle gradient background */
            background: linear-gradient(135deg, #e0f2fe 0%, #f3f4f6 100%);
            min-height: 100vh;
        }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
        }

        /* Animations */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-pop-in { animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Skeleton Loader Animation */
        @keyframes pulse-bg {
            0% { background-color: #e2e8f0; }
            50% { background-color: #cbd5e1; }
            100% { background-color: #e2e8f0; }
        }
        .skeleton { animation: pulse-bg 1.5s infinite; border-radius: 8px; }

        /* Print Media Styles */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .glass-card { box-shadow: none; border: 1px solid #ddd; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="loader" class="glass-card max-w-md w-full p-8 w-full">
        <div class="skeleton h-20 w-20 rounded-full mx-auto mb-6"></div>
        <div class="skeleton h-8 w-3/4 mx-auto mb-4"></div>
        <div class="skeleton h-4 w-1/2 mx-auto mb-8"></div>
        <div class="space-y-4">
            <div class="skeleton h-12 w-full"></div>
            <div class="skeleton h-12 w-full"></div>
            <div class="skeleton h-12 w-full"></div>
        </div>
    </div>

    <div id="verified-card" class="hidden animate-pop-in glass-card max-w-md w-full p-8 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-500 to-emerald-600"></div>
        
        <div class="bg-gradient-to-br from-teal-100 to-teal-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner overflow-hidden border-2 border-white">
            <img src="https://i.ibb.co.com/qMqFMr7Q/20260405-215444.png" alt="Foundation Logo" class="w-full h-full object-cover">
        </div>
        
        <h1 class="text-3xl font-bold text-gray-800 mb-1 tracking-tight">সদস্যপদ ভেরিফাইড</h1>
        <div class="inline-flex items-center gap-2 bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-semibold mb-6">
            <i class="fas fa-circle-check"></i> ভেরিফাইড মেম্বার
        </div>

        <div class="space-y-3 text-left bg-white/60 p-5 rounded-xl border border-gray-100">
            <div class="flex justify-between items-center border-b border-gray-200/60 pb-3">
                <span class="text-gray-500 text-sm"><i class="fas fa-id-card mr-2 opacity-70"></i>সদস্য আইডি</span>
                <span id="display-id" class="font-bold text-teal-700 uppercase tracking-widest text-lg bg-teal-50 px-2 py-1 rounded">---</span>
            </div>
            <div id="member-info-container" class="space-y-3 pt-1">
                </div>
        </div>

        <div class="mt-8 flex gap-3 no-print">
            <button onclick="window.print()" class="flex-1 bg-white border-2 border-teal-600 text-teal-700 py-3 rounded-xl font-bold hover:bg-teal-50 transition duration-200 flex items-center justify-center gap-2">
                <i class="fas fa-print"></i> প্রিন্ট
            </button>
            <a href="https://rupshajonokollanfoundation.vercel.app" class="flex-1 bg-gradient-to-r from-teal-600 to-emerald-600 text-white py-3 rounded-xl font-bold hover:shadow-lg hover:-translate-y-0.5 transition duration-200 shadow-md">
                হোম পেজ
            </a>
        </div>
    </div>

    <div id="error-card" class="hidden animate-pop-in glass-card max-w-md w-full p-8 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-500 to-rose-600"></div>
        
        <div class="bg-red-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-user-xmark text-red-500 text-5xl"></i>
        </div>
        
        <h1 class="text-2xl font-bold text-gray-800 mb-2">তথ্য পাওয়া যায়নি!</h1>
        <p id="error-message" class="text-gray-600 mb-8 bg-red-50/50 p-4 rounded-lg border border-red-100">
            দুঃখিত, এই মেম্বার আইডিটি সঠিক নয় অথবা আমাদের ডাটাবেসে নিবন্ধিত নেই।
        </p>

        <button onclick="window.location.reload()" class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200 transition duration-200 mb-3">
            <i class="fas fa-rotate-right mr-2"></i> পুনরায় চেষ্টা করুন
        </button>
        <a href="https://rupshajonokollanfoundation.vercel.app" class="block w-full text-teal-600 font-semibold hover:text-teal-700 underline underline-offset-4 mt-2">
            ফাউন্ডেশনের ওয়েবসাইটে ফিরে যান
        </a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC-ke7FIUPX5Ksow8vJQ4axmGAIdiKd49Q",
            authDomain: "member-selection.firebaseapp.com",
            projectId: "member-selection",
            storageBucket: "member-selection.firebasestorage.app",
            messagingSenderId: "434008909239",
            appId: "1:434008909239:web:a790d1e0603ebfdbd27432",
            measurementId: "G-JVMKJZLCC5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Smart ID Extraction & Sanitization
        const getMemberId = () => {
            const urlParams = new URLSearchParams(window.location.search);
            let id = urlParams.get('id');
            
            if (!id) {
                const pathParts = window.location.pathname.split('/');
                id = pathParts[pathParts.length - 1];
            }
            // Remove extra spaces and convert to uppercase for robust matching
            return id ? id.trim().toUpperCase() : null; 
        };

        const triggerConfetti = () => {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#0d9488', '#059669', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#0d9488', '#059669', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        };

        async function verifyMember() {
            const memberId = getMemberId();

            if (!memberId || memberId === 'VERIFY' || memberId === '') {
                showError("অনুগ্রহ করে একটি সঠিক মেম্বার আইডি দিন।");
                return;
            }

            try {
                const q = query(collection(db, "members"), where("member_id", "==", memberId));
                const querySnapshot = await getDocs(q);

                // Adding a slight artificial delay (min 800ms) to make the skeleton loader feel natural
                setTimeout(() => {
                    if (querySnapshot.empty) {
                        showError(`সদস্য আইডি <strong>${memberId}</strong> ডাটাবেসে পাওয়া যায়নি।`);
                    } else {
                        const memberData = querySnapshot.docs[0].data();
                        showSuccess(memberData);
                    }
                }, 800);

            } catch (error) {
                console.error("Verification Error:", error);
                showError("সার্ভারের সাথে কানেক্ট করা যাচ্ছে না। দয়া করে ইন্টারনেট কানেকশন চেক করুন।");
            }
        }

        function showSuccess(data) {
            document.getElementById('loader').classList.add('hidden');
            const verifiedCard = document.getElementById('verified-card');
            verifiedCard.classList.remove('hidden');
            
            document.getElementById('display-id').innerText = data.member_id || getMemberId();
            
            const infoContainer = document.getElementById('member-info-container');
            
            // Reusable row generator
            const createRow = (icon, label, value, valueClass = 'text-gray-800') => `
                <div class="flex justify-between items-center border-b border-gray-100 last:border-0 pb-2 last:pb-0">
                    <span class="text-gray-500 text-sm flex items-center">
                        <i class="fas ${icon} w-5 text-gray-400"></i> ${label}
                    </span>
                    <span class="font-semibold text-right ${valueClass}">${value || '---'}</span>
                </div>
            `;

            infoContainer.innerHTML = `
    ${createRow('fa-user', 'নাম', data.full_name)}
    ${createRow('fa-briefcase', 'পেশা', data.occupation)}
    ${createRow('fa-star', 'সদস্যপদ ধরন', data.membership_type, 'text-teal-700 bg-teal-50/50 px-2 rounded')}
    ${createRow('fa-droplet', 'রক্তের গ্রুপ', data.blood_group, 'text-red-600 font-bold')}
    
    /* নিচের এই ৩টি লাইন নতুন যোগ করা হয়েছে */
    ${createRow('fa-phone', 'মোবাইল নম্বর', data.phone_number)}
    ${createRow('fa-envelope', 'ইমেইল', data.email)}
    ${createRow('fa-location-dot', 'ঠিকানা', data.address)}
`;


            // Fire Confetti on success
            triggerConfetti();
        }

        function showError(customMessage = null) {
            document.getElementById('loader').classList.add('hidden');
            if (customMessage) {
                document.getElementById('error-message').innerHTML = customMessage;
            }
            document.getElementById('error-card').classList.remove('hidden');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', verifyMember);
    </script>
</body>
</html>
